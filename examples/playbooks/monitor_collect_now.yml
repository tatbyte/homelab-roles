---
# examples/playbooks/monitor_collect_now.yml
# Dedicated validation-only playbook for the shared `monitor_collect_now` role.
# Targets the existing example `monitoring` inventory group, but only runs on
# hosts where the recurring `monitor_collect` role is enabled.

- name: Run monitor_collect service immediately for validation
  hosts: monitoring
  serial: 1
  become: true
  pre_tasks:
    - name: Check local Vault vars file when enabled # noqa: run-once[task]
      ansible.builtin.stat:
        path: "{{ secret_sources_local_vault_file }}"
      delegate_to: localhost
      become: false
      vars:
        ansible_become: false
      register: monitor_collect_now_local_vault_file
      run_once: true
      tags: [always]
      when: secret_sources_use_local_vault_file | default(true)

    - name: Fail when local Vault vars are enabled but missing # noqa: run-once[task]
      ansible.builtin.fail:
        msg: >-
          secret_sources_use_local_vault_file is true, but the local Vault vars
          file was not found at {{ secret_sources_local_vault_file }}.
      run_once: true
      tags: [always]
      when:
        - secret_sources_use_local_vault_file | default(true)
        - not monitor_collect_now_local_vault_file.stat.exists

    - name: Load local Vault vars file on localhost
      ansible.builtin.include_vars:
        file: "{{ secret_sources_local_vault_file }}"
      delegate_to: localhost
      become: false
      vars:
        ansible_become: false
      tags: [always]
      when: secret_sources_use_local_vault_file | default(true)
  roles:
    - role: monitor_collect_now
      when: monitoring_include_collect | default(false)
