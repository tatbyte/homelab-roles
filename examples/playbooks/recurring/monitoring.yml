---
# examples/playbooks/recurring/monitoring.yml
# Monitoring phase playbook for the example lab.
# Applies the shared aggregate `monitoring` role to hosts in the `monitoring`
# inventory group after backup has already produced the JSON inputs that the
# status role consumes.

- name: Apply monitoring role after backup
  hosts: monitoring
  become: true
  pre_tasks:
    - name: Check local Vault vars file when enabled # noqa: run-once[task]
      ansible.builtin.stat:
        path: "{{ secret_sources_local_vault_file }}"
      delegate_to: localhost
      become: false
      vars:
        ansible_become: false
      register: monitoring_local_vault_file
      run_once: true
      tags: [always]
      when: secret_sources_use_local_vault_file | default(true)

    - name: Fail when local Vault vars are enabled but missing # noqa: run-once[task]
      ansible.builtin.fail:
        msg: >-
          secret_sources_use_local_vault_file is true, but the local Vault vars
          file was not found at {{ secret_sources_local_vault_file }}.
      run_once: true
      tags: [always]
      when:
        - secret_sources_use_local_vault_file | default(true)
        - not monitoring_local_vault_file.stat.exists

    - name: Load local Vault vars file on localhost
      ansible.builtin.include_vars:
        file: "{{ secret_sources_local_vault_file }}"
      delegate_to: localhost
      become: false
      vars:
        ansible_become: false
      tags: [always]
      when: secret_sources_use_local_vault_file | default(true)
  roles:
    - role: monitoring
