---
# examples/playbooks/recurring/backup.yml
# Backup phase playbook for the example lab.
# Applies the shared aggregate `backup` role to hosts in the `backup` inventory group.
# That aggregate role owns recurring Restic setup plus init/prune/check
# companions when their inventory toggles are enabled.

- name: Apply backup role after docker
  hosts: backup
  become: true
  roles:
    - role: backup
