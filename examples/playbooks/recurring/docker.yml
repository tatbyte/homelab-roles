---
# examples/playbooks/recurring/docker.yml
# Docker phase playbook for the example lab.
# Connects as the automation account after the user phase, applies the aggregate
# `docker` role to hosts in the `docker` inventory group, and optionally
# re-runs `base_firewall` so Docker-declared ports can be enforced after service
# registration.

- name: Apply docker role after user
  hosts: docker
  become: true
  roles:
    - role: docker
    - role: base_firewall
      when: base_firewall_enabled | default(base_include_firewall | default(false))
