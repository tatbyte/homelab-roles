---
# examples/playbooks/bootstrap.yml
# Bootstrap phase playbook for the example lab.
# Uses inventory- and Vault-backed bootstrap login credentials, loads an
# optional local Vault vars file from the control machine inside the bootstrap
# play so `--limit` runs still receive the overrides, and applies the
# `bootstrap` role with the initial admin account.

- name: Bootstrap hosts using the initial admin account
  hosts: bootstrap
  become: true
  gather_facts: false
  pre_tasks:
    - name: Check local Vault vars file when enabled # noqa: run-once[task]
      ansible.builtin.stat:
        path: "{{ secret_sources_local_vault_file }}"
      delegate_to: localhost
      become: false
      vars:
        ansible_become: false
      register: bootstrap_local_vault_file
      run_once: true
      tags: [always]
      when: secret_sources_use_local_vault_file | default(true)

    - name: Fail when local Vault vars are enabled but missing # noqa: run-once[task]
      ansible.builtin.fail:
        msg: >-
          secret_sources_use_local_vault_file is true, but the local Vault vars
          file was not found at {{ secret_sources_local_vault_file }}.
      run_once: true
      tags: [always]
      when:
        - secret_sources_use_local_vault_file | default(true)
        - not bootstrap_local_vault_file.stat.exists

    - name: Load local Vault vars file on localhost # noqa: run-once[task]
      ansible.builtin.include_vars:
        file: "{{ secret_sources_local_vault_file }}"
        name: bootstrap_local_vault_vars
      delegate_to: localhost
      delegate_facts: true
      become: false
      vars:
        ansible_become: false
      run_once: true
      tags: [always]
      when: secret_sources_use_local_vault_file | default(true)

    - name: Share bootstrap credential overrides with target hosts
      ansible.builtin.set_fact:
        bootstrap_effective_login_password: >-
          {{
            hostvars['localhost'].bootstrap_local_vault_vars.vault_bootstrap_login_password
            if (secret_sources_use_local_vault_file | default(true))
            else bootstrap_login_password
          }}
        bootstrap_effective_login_become_password: >-
          {{
            (
              hostvars['localhost'].bootstrap_local_vault_vars.vault_bootstrap_login_become_password
              | default(hostvars['localhost'].bootstrap_local_vault_vars.vault_bootstrap_login_password)
            )
            if (secret_sources_use_local_vault_file | default(true))
            else bootstrap_login_become_password
          }}
      tags: [always]

    - name: Set effective bootstrap connection variables
      ansible.builtin.set_fact:
        ansible_user: "{{ bootstrap_login_user }}"
        ansible_password: "{{ bootstrap_effective_login_password }}"
        ansible_become_password: "{{ bootstrap_effective_login_become_password }}"
      tags: [always]
  roles:
    - role: bootstrap
      tags: [bootstrap]
