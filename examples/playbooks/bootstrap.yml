---
- name: Bootstrap hosts using the initial admin account
  hosts: bootstrap
  become: true

  vars_prompt:
    - name: bootstrap_admin_password
      prompt: SSH password for bootstrap admin
      private: true

  vars:
    ansible_user: "{{ bootstrap_login_user }}"
    ansible_password: "{{ bootstrap_admin_password }}"
    ansible_become_password: "{{ bootstrap_admin_password }}"
  roles:
    - role: bootstrap
      tags: [bootstrap]
