---
# examples/playbooks/bootstrap.yml
# Bootstrap phase playbook for the example lab.
# Uses inventory- and Vault-backed bootstrap login credentials, loads a local
# Vault vars file on localhost before target connection setup, and applies the
# `bootstrap` role with the initial admin account.

- name: Load bootstrap Vault vars on localhost
  hosts: localhost
  become: false
  gather_facts: false
  vars:
    ansible_become: false
  tasks:
    - name: Check local Vault vars file when enabled
      ansible.builtin.stat:
        path: "{{ secret_sources_local_vault_file }}"
      register: bootstrap_local_vault_file
      tags: [always]
      when: secret_sources_use_local_vault_file | default(true)

    - name: Fail when local Vault vars are enabled but missing
      ansible.builtin.fail:
        msg: >-
          secret_sources_use_local_vault_file is true, but the local Vault vars
          file was not found at {{ secret_sources_local_vault_file }}.
      tags: [always]
      when:
        - secret_sources_use_local_vault_file | default(true)
        - not bootstrap_local_vault_file.stat.exists

    - name: Load local Vault vars file
      ansible.builtin.include_vars:
        file: "{{ secret_sources_local_vault_file }}"
        name: bootstrap_local_vault_vars
      tags: [always]
      when: secret_sources_use_local_vault_file | default(true)

    - name: Share bootstrap credential overrides with target hosts
      ansible.builtin.add_host:
        name: "{{ item }}"
        bootstrap_login_password: "{{ bootstrap_local_vault_vars.vault_bootstrap_login_password }}"
        bootstrap_login_become_password: >-
          {{
            bootstrap_local_vault_vars.vault_bootstrap_login_become_password
            | default(bootstrap_local_vault_vars.vault_bootstrap_login_password)
          }}
      loop: "{{ groups['bootstrap'] | default([]) }}"
      loop_control:
        label: "{{ item }}"
      changed_when: false
      tags: [always]
      when: secret_sources_use_local_vault_file | default(true)

- name: Bootstrap hosts using the initial admin account
  hosts: bootstrap
  become: true
  gather_facts: false
  vars:
    ansible_user: "{{ bootstrap_login_user }}"
    ansible_password: "{{ bootstrap_login_password }}"
    ansible_become_password: "{{ bootstrap_login_become_password }}"
  roles:
    - role: bootstrap
      tags: [bootstrap]
