---
# examples/playbooks/ops/bootstrap.yml
# Bootstrap phase playbook for the example lab.
# Uses inventory- and Vault-backed bootstrap login credentials and applies the
# `bootstrap` role with the initial admin account.

- name: Bootstrap hosts using the initial admin account
  hosts: bootstrap
  become: true
  gather_facts: false
  pre_tasks:
    - name: Set bootstrap connection variables
      ansible.builtin.set_fact:
        ansible_user: "{{ bootstrap_login_user }}"
        ansible_password: "{{ bootstrap_login_password }}"
        ansible_become_password: "{{ bootstrap_login_become_password }}"
      tags: [always]
  roles:
    - role: bootstrap
      tags: [bootstrap]
