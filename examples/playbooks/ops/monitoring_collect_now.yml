---
# examples/playbooks/ops/monitoring_collect_now.yml
# Dedicated validation-only playbook for the shared `monitoring_collect_now` role.
# Targets the existing example `monitoring` inventory group, but only runs on
# hosts where the recurring `monitoring_collect` role is enabled.

- name: Run monitoring_collect service immediately for validation
  hosts: monitoring
  serial: 1
  become: true
  roles:
    - role: monitoring_collect_now
      when: monitoring_include_collect | default(false)
