---
# examples/playbooks/ops/monitoring_notify_now.yml
# Dedicated validation-only playbook for the shared `monitoring_notify_now` role.
# Targets the existing example `monitoring` inventory group, but only runs on
# hosts where the recurring `monitoring_notify` role is enabled.

- name: Run monitoring_notify service immediately for validation
  hosts: monitoring
  serial: 1
  become: true
  pre_tasks:
    - name: Check local Vault vars file when enabled # noqa: run-once[task]
      ansible.builtin.stat:
        path: "{{ secret_sources_local_vault_file }}"
      delegate_to: localhost
      become: false
      vars:
        ansible_become: false
      register: monitoring_notify_now_local_vault_file
      run_once: true
      tags: [always]
      when: secret_sources_use_local_vault_file | default(true)

    - name: Fail when local Vault vars are enabled but missing # noqa: run-once[task]
      ansible.builtin.fail:
        msg: >-
          secret_sources_use_local_vault_file is true, but the local Vault vars
          file was not found at {{ secret_sources_local_vault_file }}.
      run_once: true
      tags: [always]
      when:
        - secret_sources_use_local_vault_file | default(true)
        - not monitoring_notify_now_local_vault_file.stat.exists

    - name: Load local Vault vars file on localhost
      ansible.builtin.include_vars:
        file: "{{ secret_sources_local_vault_file }}"
      delegate_to: localhost
      become: false
      vars:
        ansible_become: false
      tags: [always]
      when: secret_sources_use_local_vault_file | default(true)

    - name: Detect existing monitoring_notify service install
      ansible.builtin.stat:
        path: /etc/systemd/system/monitor-notify.service
      register: monitoring_notify_now_service_install
      tags: [always]
  roles:
    - role: monitoring_notify_now
      when:
        - monitoring_include_notify | default(false)
          or (monitoring_notify_now_service_install.stat.exists | default(false))
