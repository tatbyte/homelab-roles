---
# examples/playbooks/ops/monitoring_notify_now.yml
# Dedicated validation-only playbook for the shared `monitoring_notify_now` role.
# Targets the existing example `monitoring` inventory group, but only runs on
# hosts where the recurring `monitoring_notify` role is enabled.

- name: Run monitoring_notify service immediately for validation
  hosts: monitoring
  serial: 1
  become: true
  pre_tasks:
    - name: Detect existing monitoring_notify service install
      ansible.builtin.stat:
        path: /etc/systemd/system/monitor-notify.service
      register: monitoring_notify_now_service_install
      tags: [always]
  roles:
    - role: monitoring_notify_now
      when:
        - monitoring_include_notify | default(false)
          or (monitoring_notify_now_service_install.stat.exists | default(false))
