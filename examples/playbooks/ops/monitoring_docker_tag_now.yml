---
# examples/playbooks/ops/monitoring_docker_tag_now.yml
# Dedicated validation-only playbook for the shared
# `monitoring_docker_tag_now` role. Targets the existing `monitoring`
# inventory group and forces the managed `monitoring-docker-tag.service`
# oneshot unit to run immediately without changing the recurring timer
# configuration.

- name: Run monitoring_docker_tag service immediately for validation
  hosts: monitoring
  serial: 1
  become: true
  roles:
    - role: monitoring_docker_tag_now
      when: monitoring_include_docker_tag | default(false)
