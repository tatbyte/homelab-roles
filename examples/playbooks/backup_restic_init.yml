---
# examples/playbooks/backup_restic_init.yml
# Dedicated operational playbook for the shared `backup_restic_init` role.
# Loads the optional local Vault vars file, targets the `backup` inventory
# group, reapplies the shared `backup_restic` role for package/config
# convergence, and initializes the repository once when it does not exist yet.

- name: Initialize backup_restic repository if missing
  hosts: backup
  become: true
  pre_tasks:
    - name: Check local Vault vars file when enabled # noqa: run-once[task]
      ansible.builtin.stat:
        path: "{{ secret_sources_local_vault_file }}"
      delegate_to: localhost
      become: false
      vars:
        ansible_become: false
      register: backup_init_local_vault_file
      run_once: true
      tags: [always]
      when: secret_sources_use_local_vault_file | default(true)

    - name: Fail when local Vault vars are enabled but missing # noqa: run-once[task]
      ansible.builtin.fail:
        msg: >-
          secret_sources_use_local_vault_file is true, but the local Vault vars
          file was not found at {{ secret_sources_local_vault_file }}.
      run_once: true
      tags: [always]
      when:
        - secret_sources_use_local_vault_file | default(true)
        - not backup_init_local_vault_file.stat.exists

    - name: Load local Vault vars file on localhost
      ansible.builtin.include_vars:
        file: "{{ secret_sources_local_vault_file }}"
      delegate_to: localhost
      become: false
      vars:
        ansible_become: false
      tags: [always]
      when: secret_sources_use_local_vault_file | default(true)
  roles:
    - role: backup_restic
      when: backup_include_restic | default(false)
    - role: backup_restic_init
      when: backup_include_restic | default(false)
