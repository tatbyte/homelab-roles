---
# examples/playbooks/monitoring_storage_health_now.yml
# Dedicated validation-only playbook for the shared
# `monitoring_storage_health_now` role. Targets the existing `monitoring`
# inventory group and forces the managed `monitoring-storage-health.service`
# oneshot unit to run immediately without changing the recurring timer
# configuration.

- name: Run monitoring_storage_health service immediately for validation
  hosts: monitoring
  serial: 1
  become: true
  roles:
    - role: monitoring_storage_health_now
      when: monitoring_include_storage_health | default(false)
