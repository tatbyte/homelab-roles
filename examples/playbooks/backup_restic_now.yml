---
# examples/playbooks/backup_restic_now.yml
# Dedicated validation-only playbook for the shared `backup_restic_now` role.
# Targets the existing `backup` inventory group and forces the managed
# `backup-restic.service` oneshot unit to run immediately without changing the
# recurring timer configuration.

- name: Run backup_restic service immediately for validation
  hosts: backup
  serial: 1
  become: true
  roles:
    - role: backup_restic_now
      when: backup_include_restic | default(false)
