# examples/inventory/hosts.ini
# Example inventory for the local lab.
# Defines the lab host, layer groups, and shared connection defaults for the
# example playbooks.

[all]
lab ansible_host=192.168.0.101 alias=lab

[bootstrap]
lab

[base]
lab

[user]
lab

[docker]
lab

[backup]
lab

[all:vars]
ansible_user=ansible
ansible_become=true
ansible_python_interpreter=/usr/bin/python3
