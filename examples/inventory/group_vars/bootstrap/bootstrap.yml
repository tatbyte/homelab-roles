---
# examples/inventory/group_vars/bootstrap/bootstrap.yml
# Shared bootstrap variables for the example lab.
# Defines the automation account, sudo behavior, and authorized key used during the bootstrap phase.

# Initial ansible account created early in provisioning.
# This user is the main management account used for SSH + sudo access.
bootstrap_user: ansible                      # primary ansible username

# Fixed UID/GID for consistency across hosts.
# Keeping these stable helps with file ownership, recovery, and automation.
bootstrap_puid: 1100                        # user ID for the ansible account
bootstrap_pgid: 1100                        # primary group ID for the ansible account

# Sudo-capable group to attach the admin user to.
# On Debian/Ubuntu this is usually "sudo".
bootstrap_sudo_group: sudo                  # group that grants sudo privileges
bootstrap_passwordless_sudo: true           # allow ansible user to run sudo without prompting

# Login shell for the admin account.
# /bin/bash is a safe default for interactive administration.
bootstrap_user_shell: /bin/bash             # default shell for the ansible user

# Public SSH key added to authorized_keys for passwordless admin access.
# Store only the public key here, never a private key.
bootstrap_authorized_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIAn7kkLsf1GYLBmx4D3R4t/C3H7eWStv9u8vXJdc3LYr ansible-test"  # ansible SSH public key

# Initial bootstrap login used before the managed automation account takes over.
# Keep the example-wide login here and pull passwords from Vault-backed vars so
# the playbook can connect non-interactively.
bootstrap_login_user: admin
bootstrap_login_password: "{{ vault_bootstrap_login_password }}"
bootstrap_login_become_password: >-
  {{ vault_bootstrap_login_become_password | default(vault_bootstrap_login_password) }}
