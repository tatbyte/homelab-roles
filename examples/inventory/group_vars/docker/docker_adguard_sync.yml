---
# examples/inventory/group_vars/docker/docker_adguard_sync.yml
# Shared Docker AdGuard Sync variables for the example lab.
# Defines the `adguardhome-sync` Compose, Traefik proxy-network, AdGuard-shared
# identity, origin/replica endpoints, and Vault-backed sync UI credentials
# exercised through the aggregate `docker` role.

# Keep the AdGuard Sync role internally enabled when the aggregate toggle turns
# it on for the example lab.
docker_adguard_sync_enabled: true

# Reuse the same Docker package family and shared access identities that the
# AdGuard role already owns on the example host. `docker_adguard_packages`
# already inherits the engine-level Compose family by default, so sync stays
# aligned even if AdGuard is overridden later on a specific host.
docker_adguard_sync_packages: "{{ docker_adguard_packages | default([]) }}"
docker_adguard_sync_compose_command: "{{ docker_adguard_compose_command | default(['docker', 'compose']) }}"
docker_adguard_sync_project_dir: /srv/adguard-sync
docker_adguard_sync_data_dir: "{{ docker_adguard_sync_project_dir }}/data"
docker_adguard_sync_compose_project_name: adguard-sync
docker_adguard_sync_compose_service_name: adguard-sync
docker_adguard_sync_container_name: adguard-sync
docker_adguard_sync_service_user: "{{ docker_adguard_service_user }}"
docker_adguard_sync_service_uid: "{{ docker_adguard_service_uid }}"
docker_adguard_sync_access_group: "{{ docker_adguard_access_group }}"
docker_adguard_sync_access_gid: "{{ docker_adguard_access_gid }}"
docker_adguard_sync_service_user_shell: "{{ docker_adguard_service_user_shell }}"
docker_adguard_sync_service_user_home: "{{ docker_adguard_project_dir }}"
docker_adguard_sync_manage_access_group_memberships: "{{ docker_adguard_manage_access_group_memberships }}"
docker_adguard_sync_access_group_members: "{{ docker_adguard_access_group_members | to_json | from_json }}"

# Publish the AdGuard Sync web UI through Traefik, but keep the internal sync
# traffic on LAN IP plus direct AdGuard HTTP bind port so replica updates do
# not depend on public-name resolution.
# Build the sync host from the inventory alias so each host gets a stable URL
# such as `adguard-sync.lab.example.com` in the example lab.
docker_adguard_sync_proxy_network_name: "{{ docker_traefik_network_name }}"
docker_adguard_sync_host: "adguard-sync.{{ docker_public_host_alias }}.{{ docker_public_domain_suffix }}"
docker_adguard_sync_origin:
  url: "http://{{ vault_docker_adguard_sync_origin_ip }}:{{ docker_adguard_http_bind_port }}"
  username: "{{ docker_adguard_admin_credentials.split(':', 1)[0] }}"
  password: "{{ vault_docker_adguard_sync_adguard_password }}"
docker_adguard_sync_replicas:
  - url: "http://{{ vault_docker_adguard_sync_replica_ip }}:{{ docker_adguard_http_bind_port }}"
    username: "{{ docker_adguard_admin_credentials.split(':', 1)[0] }}"
    password: "{{ vault_docker_adguard_sync_adguard_password }}"

# Keep the sync daemon API login in Vault because this UI is published through
# Traefik and should not use checked-in credentials.
docker_adguard_sync_api_username: "{{ vault_docker_adguard_sync_api_username }}"
docker_adguard_sync_api_password: "{{ vault_docker_adguard_sync_api_password }}"
