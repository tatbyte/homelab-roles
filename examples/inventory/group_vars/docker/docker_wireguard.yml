---
# examples/inventory/group_vars/docker/docker_wireguard.yml
# Shared Docker WireGuard variables for the example lab.
# Defines the `wg-easy` Compose, Traefik proxy-network, service identity,
# initial admin setup, VPN listener, and firewall behavior exercised through
# the aggregate `docker` role.

# Keep the WireGuard role enabled in the example lab.
docker_wireguard_enabled: true

# Inherit the engine-level Compose support package choice so the service role
# stays on the same package family as `docker_engine`.
docker_wireguard_packages: "{{ docker_engine_compose_packages | default([]) }}"

# Keep the example WireGuard project under `/srv` so backup and host-restore
# workflows can capture the whole service layout predictably.
docker_wireguard_project_dir: /srv/wireguard
docker_wireguard_data_dir: "{{ docker_wireguard_project_dir }}/data"
docker_wireguard_compose_project_name: wireguard
docker_wireguard_compose_service_name: wireguard
docker_wireguard_container_name: wireguard
# Keep the example lab on the currently checked tag that works across both the
# Ubuntu example host and the 32-bit Raspberry Pi test host.
docker_wireguard_image: ghcr.io/wg-easy/wg-easy:15.1.0
docker_wireguard_service_user: srv_wireguard
docker_wireguard_service_uid: 1220
docker_wireguard_access_group: access_wireguard
docker_wireguard_access_gid: 1220
docker_wireguard_service_user_shell: /usr/sbin/nologin
docker_wireguard_manage_access_group_memberships: true
docker_wireguard_access_group_members:
  - "{{ bootstrap_user }}"
  - "{{ user_account_name }}"

# Join the Traefik-owned proxy network and publish the `wg-easy` web UI
# through Compose labels instead of exposing the dashboard directly on the
# host.
docker_wireguard_proxy_network_name: "{{ docker_traefik_network_name }}"
docker_wireguard_host: "{{ vault_docker_wireguard_host }}"
docker_wireguard_web_ui_enabled: true
docker_wireguard_router_name: wireguard
docker_wireguard_router_entrypoints:
  - websecure
docker_wireguard_tls_certresolver: "{{ docker_traefik_certresolver_name | default('letsencrypt') }}"
docker_wireguard_container_web_port: 51821
docker_wireguard_ui_bind_host: 0.0.0.0
docker_wireguard_insecure: false
docker_wireguard_disable_ipv6: false
docker_wireguard_init_enabled: true
docker_wireguard_admin_username: "{{ vault_docker_wireguard_admin_username }}"
docker_wireguard_admin_password: "{{ vault_docker_wireguard_admin_password }}"
docker_wireguard_init_dns: "{{ vault_docker_wireguard_init_dns | to_json | from_json }}"

# Keep the example WireGuard listener and required capabilities close to the
# official `wg-easy` docs so the role exercises the documented container
# environment for VPN plus web UI.
docker_wireguard_cap_add:
  - NET_ADMIN
  - SYS_MODULE
docker_wireguard_vpn_bind_port: 51820
docker_wireguard_modules_path: /lib/modules
docker_wireguard_mount_modules: true
docker_wireguard_sysctls:
  - net.ipv4.conf.all.src_valid_mark=1
  - net.ipv4.ip_forward=1

# Register the VPN UDP firewall rule so the follow-up base_firewall run in the
# Docker playbook can enforce it after this role has declared it.
docker_wireguard_manage_firewall_rules: true
docker_wireguard_firewall_rules:
  - rule: allow
    direction: in
    port: "{{ docker_wireguard_vpn_bind_port | string }}"
    proto: udp
    comment: "managed:docker_wireguard:vpn-udp"
