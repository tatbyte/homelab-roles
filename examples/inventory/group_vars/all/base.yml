---
# examples/inventory/group_vars/all/base.yml
# Shared aggregate base-role variables for the example lab.
# Defines disabled-by-default base-role toggles for the whole example
# inventory. The matching `examples/inventory/group_vars/base/*.yml` files
# re-enable the normal base-group defaults, and
# `examples/inventory/host_vars/<host>/vars.yml` can still override
# individual roles per host when needed.

base_packages_enabled: false
base_locale_enabled: false
base_timezone_enabled: false
base_ntp_enabled: false
base_hostname_enabled: false
base_hosts_enabled: false
base_dns_enabled: false
base_sudo_enabled: false
base_sshd_enabled: false
base_firewall_enabled: false
base_fail2ban_enabled: false
base_logging_enabled: false
base_updates_enabled: false
base_apparmor_enabled: false
base_auditd_enabled: false
base_upgrade_enabled: false
base_needrestart_enabled: false
