---
# examples/inventory/group_vars/all/secret_sources.yml
# Shared secret-source selection variables for the example lab.
# Defines whether example playbooks may load controller-local secret files and which paths to use.

# Keep this enabled by default so the example lab continues to use the external
# Vault workflow documented for `~/.config/ansible/lab_vault.yml`.
secret_sources_use_local_vault_file: true

# Default controller-local Vault file used by example playbooks when the shared
# secret-source switch is enabled.
secret_sources_local_vault_file: "{{ lookup('env', 'HOME') }}/.config/ansible/lab_vault.yml"
