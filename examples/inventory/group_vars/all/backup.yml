---
# examples/inventory/group_vars/all/backup.yml
# Shared backup-layer toggle variables for the example lab.
# Defines the default-off switches for the recurring backup layer. Keep these
# disabled in `group_vars/all`, enable them per inventory group where a whole
# class of hosts should participate, and let host_vars make the final override
# when needed.

# Keep the backup layer disabled by default in the broadest shared scope so
# example inventories can opt groups in intentionally without surprising
# unrelated hosts.
backup_include_restic: false
backup_include_restic_prune: false
backup_include_restic_check: false

backup_restic_enabled: false
backup_restic_prune_enabled: false
backup_restic_check_enabled: false
restore_restic_enabled: false
