---
# examples/inventory/group_vars/all/user_sudo.yml
# Shared human admin sudo variables for the example lab.
# Defines the explicit sudoers drop-in enforced after account and supplementary-group setup through the aggregate `user` role.

# Existing human admin account whose sudo access is managed in the example lab.
user_sudo_user: "{{ user_account_name }}"

# Keep the example policy user-specific so the managed drop-in stays scoped to
# the example human admin account instead of affecting every member of `sudo`.
user_sudo_policy_type: user

# Group value used only when `user_sudo_policy_type: group`.
user_sudo_group: sudo

# Keep prompted sudo in the example lab by default.
# Set this to true if you want the managed example admin account to use
# passwordless sudo instead.
user_sudo_passwordless: false

# Keep the managed sudoers file path stable for the example user layer.
user_sudo_drop_in_path: "/etc/sudoers.d/90-user_sudo-{{ user_sudo_user }}"
