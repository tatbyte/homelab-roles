---
# examples/inventory/group_vars/all/user_git.yml
# Shared human admin Git variables for the example lab.
# Defines the managed Git identity and alias baseline enforced after the directory layer through the aggregate `user` role.

# Keep the example Git baseline scoped to the same human admin account managed
# earlier in `user_account.yml`.
user_git_users:
  - user: "{{ user_account_name }}"
    group: "{{ user_account_primary_group }}"
    home: "{{ user_account_home }}"
    name: Example Human User
    email: human-user@example.invalid
    aliases:
      st: status --short --branch
      co: checkout
      br: branch
      ci: commit
      lg: "log --oneline --graph --decorate"
    settings:
      init.defaultBranch: main
      pull.rebase: "false"
      push.autoSetupRemote: "true"
      core.editor: vim
