---
# examples/inventory/group_vars/all/base_packages.yml
# Shared package variables for the example lab.
# Defines common packages to install and packages to keep absent during the base phase.

# Packages that should exist on almost every homelab host.
# Keep this role generic: only "common everywhere" packages belong here.
base_packages_install:
  # HTTPS / repo / package trust
  - ca-certificates   # trusted CA bundle for HTTPS downloads and APT repos
  - curl              # download files / test HTTP endpoints
  - wget              # alternative downloader, useful in scripts
  - gnupg             # manage repo signing keys
  - lsb-release       # expose distro release info for scripts / repos

  # Core admin / shell usability
  - git               # clone repos / version control
  - sudo              # privilege escalation
  - bash-completion   # shell tab-completion improvements

  # Basic editors / file viewing
  - vim               # main terminal editor
  - nano              # simple fallback editor
  - less              # pager for logs / long command output
  - tree              # view directory structure quickly
  - file              # identify file types

  # System monitoring / host inspection
  - htop              # interactive process viewer
  - ncdu              # disk usage explorer
  - lsof              # list open files / ports in use

  # Archive / copy / permissions
  - rsync             # sync / copy data efficiently
  - tar               # archive handling
  - zip               # create zip archives
  - unzip             # extract zip archives
  - acl               # filesystem ACL support

  # Data parsing / automation helpers
  - jq                # parse JSON in scripts

  # Network / troubleshooting
  - dnsutils          # dig / nslookup for DNS debugging
  - iputils-ping      # ping command
  - net-tools         # legacy tools like netstat / ifconfig
  - traceroute        # trace network path
  - tcpdump           # packet capture for debugging

  # Ansible-managed host requirements
  - python3           # required on most hosts for Ansible modules
  - python3-apt       # lets Ansible manage apt packages properly on Debian/Ubuntu

# Packages to remove from all hosts if you want to enforce absence.
# Leave empty until you have a clear reason to remove something globally.
base_packages_remove: []
