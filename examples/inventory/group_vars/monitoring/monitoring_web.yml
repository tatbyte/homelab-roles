---
# examples/inventory/group_vars/monitoring/monitoring_web.yml
# Shared dashboard web variables for the example monitoring hosts.

monitoring_web_image_repository: nginx
monitoring_web_image_tag: "1.27-alpine"
monitoring_web_image: "{{ monitoring_web_image_repository }}:{{ monitoring_web_image_tag }}"
monitoring_web_title: "{{ vault_monitoring_collect_web_title | default('Lab Monitor') }}"
monitoring_web_short_title: "{{ vault_monitoring_collect_web_short_title | default('Monitor') }}"
monitoring_web_basic_auth_users: "{{ vault_monitoring_collect_web_basic_auth_users | default([]) | to_json | from_json }}"
monitoring_web_basic_auth_enabled: "{{ (monitoring_web_basic_auth_users | length) > 0 }}"
