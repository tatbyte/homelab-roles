---
# examples/inventory/group_vars/user/user_directories.yml
# Shared human admin directory variables for the example lab.
# Defines the managed workspace-directory baseline enforced after the shell layer through the aggregate `user` role.

# Keep the example directory baseline scoped to the same human admin account
# managed earlier in `user_account.yml`.
user_directories_users:
  - user: "{{ user_account_name }}"
    group: "{{ user_account_primary_group }}"
    home: "{{ user_account_home }}"
    directories:
      - path: .local/bin
        mode: "0755"
      - path: scripts
        mode: "0755"
      - path: .config
        mode: "0700"
      - path: projects
        mode: "0755"
