---
# examples/inventory/group_vars/base/base_needrestart.yml
# Shared needrestart variables for the example lab.
# Defines the non-interactive restart-check behavior exposed during the base phase.

base_needrestart_enabled: false
# Package list installed with APT to provide the needrestart restart-check
# command used by the example lab.
base_needrestart_packages:
  - needrestart

# Keep the example role in list-only restart-check mode so it reports pending
# follow-up without restarting services automatically.
# This role currently does not restart services or reboot the host for you.
# If you want automatic reboot during package maintenance, use the
# `base_upgrade_allow_reboot` setting in `base_upgrade.yml`.
base_needrestart_mode: l

# Fail the example run when needrestart reports reboot follow-up.
# This makes pending reboot work visible immediately even though the role
# still leaves the actual reboot decision to you or to `base_upgrade`.
# Set this back to `false` when you want a report-only example run.
base_needrestart_fail_if_reboot_required: true

# Fail the example run when needrestart reports service restart follow-up.
# This is the strictest supported v1 behavior for the role until automated
# service-restart handling is added later.
# Set this back to `false` when you want a report-only example run.
base_needrestart_fail_if_service_restart_required: true
