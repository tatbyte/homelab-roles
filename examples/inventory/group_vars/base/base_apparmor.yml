---
# examples/inventory/group_vars/base/base_apparmor.yml
# Shared AppArmor variables for the example lab.
# Defines the AppArmor package, service, and enabled-state baseline enforced during the base phase.

# Package list installed with APT to provide the AppArmor baseline and
# validation tooling used by the role.
base_apparmor_packages:
  - apparmor
  - apparmor-utils

# AppArmor service name managed and validated during the base phase.
base_apparmor_service_name: apparmor

# Keep AppArmor disabled in shared example vars, then enable it per host when
# the kernel and policy baseline are ready there.
# Set this to false when you explicitly want the package baseline installed
# without the service being active.
base_apparmor_enabled: false
