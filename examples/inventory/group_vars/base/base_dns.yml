---
# examples/inventory/group_vars/base/base_dns.yml
# Shared DNS variables for the example lab.
# Defines the resolver mode, DNS servers, and optional search domains enforced during the base phase.

# Resolver backend managed during the base phase.
# Keep the default `systemd_resolved` mode in the example lab so DNS state
# stays explicit through /etc/systemd/resolved.conf on Debian-family hosts.
# Hosts that use NetworkManager can override this per host to
# `networkmanager`.
# Example host_vars override:
# base_dns_resolver_mode: networkmanager
# base_dns_service_name: NetworkManager
base_dns_resolver_mode: systemd_resolved

# Resolver service name enabled and validated during the base phase.
base_dns_service_name: systemd-resolved

# Global DNS servers written to /etc/systemd/resolved.conf.
# Replace these with your router, Pi-hole, AdGuard Home, or other local
# resolvers when adapting the example lab to a real homelab environment.
base_dns_servers:
  - 1.1.1.1
  - 1.0.0.1

# Optional search domains written to /etc/systemd/resolved.conf.
# Keep this empty unless you want short-name lookups such as `nas` to expand
# through a shared homelab suffix like `lab.home.arpa`.
base_dns_search_domains: []
# base_dns_search_domains:
#   - lab.home.arpa
