# examples/ansible.cfg
# Example Ansible configuration for the local lab.
# Points Ansible at the example inventory and the repository roles directory.

[defaults]
 # Path to example inventory file
inventory = inventory/hosts.ini
 # Path to roles directory (relative to this file)
roles_path = ../roles
 # File containing Ansible Vault password
vault_password_file = ~/.config/ansible/vault.pass
 # Also auto-load inventory-local `vault.vars` files from group_vars/host_vars.
yaml_valid_extensions = .yml, .yaml, .json, .vars
 # Auto-detect python interpreter silently
interpreter_python = auto_silent
 # Hide skipped hosts in output
display_skipped_hosts = False

[privilege_escalation]
 # Enable privilege escalation (sudo)
become = True
 # Use sudo for privilege escalation
become_method = sudo
 # Don't prompt for sudo password
become_ask_pass = False
