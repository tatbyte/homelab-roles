---
# roles/monitor_web/defaults/main.yml
# Default variables for the `monitor_web` role.
# Publishes the collected monitoring dashboard through Docker + Traefik while
# reusing the existing monitor-collect web project naming on disk.

monitor_web_enabled: true

monitor_web_unit_name: monitor-collect-web
monitor_web_legacy_service_unit: "{{ monitor_web_unit_name }}.service"
monitor_web_project_dir: "/srv/{{ monitor_web_unit_name }}"
monitor_web_compose_file_path: "{{ monitor_web_project_dir }}/compose.yml"
monitor_web_nginx_conf_path: "{{ monitor_web_project_dir }}/default.conf"
monitor_web_publish_dir: "{{ monitor_web_project_dir }}/site"
monitor_web_publish_hosts_dir: "{{ monitor_web_publish_dir }}/hosts"
monitor_web_publish_html_path: "{{ monitor_web_publish_dir }}/index.html"
monitor_web_publish_index_path: "{{ monitor_web_publish_dir }}/index.json"
monitor_web_manifest_path: "{{ monitor_web_publish_dir }}/manifest.webmanifest"
monitor_web_service_worker_path: "{{ monitor_web_publish_dir }}/service-worker.js"
monitor_web_icon_path: "{{ monitor_web_publish_dir }}/icon.svg"
monitor_web_icon_png_180_path: "{{ monitor_web_publish_dir }}/icon-180.png"
monitor_web_icon_png_192_path: "{{ monitor_web_publish_dir }}/icon-192.png"
monitor_web_icon_png_512_path: "{{ monitor_web_publish_dir }}/icon-512.png"
monitor_web_compose_project_name: "{{ monitor_web_unit_name }}"
monitor_web_compose_service_name: web
monitor_web_container_name: "{{ monitor_web_unit_name }}"
monitor_web_image: nginx:1.27-alpine
monitor_web_compose_command: "{{ docker_engine_effective_compose_command | default(['docker', 'compose']) }}"
monitor_web_proxy_network_name: "{{ docker_traefik_network_name | default('traefik_proxy') }}"
monitor_web_host: ""
monitor_web_router_name: "{{ monitor_web_unit_name }}"
monitor_web_basic_auth_enabled: false
monitor_web_basic_auth_users: []
monitor_web_basic_auth_middleware: "{{ monitor_web_router_name }}-auth"
monitor_web_router_entrypoints:
  - websecure
monitor_web_tls_certresolver: "{{ docker_traefik_certresolver_name | default('letsencrypt') }}"
monitor_web_container_port: 80
monitor_web_publish_dir_mode: "0755"
monitor_web_publish_file_mode: "0644"
monitor_web_site_owner: "{{ monitor_collect_service_user | default(ansible_user | default('root')) }}"
monitor_web_site_group: "{{ monitor_collect_service_group | default(ansible_user | default('root')) }}"
monitor_web_title: Homelab Monitor
monitor_web_short_title: Monitor
monitor_web_theme_color: "#071019"
monitor_web_background_color: "#071019"
