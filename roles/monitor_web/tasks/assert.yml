---
# roles/monitor_web/tasks/assert.yml
# Assert phase tasks for the `monitor_web` role.

- name: "Assert | Validate monitor_web variables when enabled"
  ansible.builtin.assert:
    that:
      - monitor_web_enabled is boolean
      - monitor_web_compose_command is sequence
      - monitor_web_compose_command | length > 0
      - monitor_web_project_dir is string
      - monitor_web_project_dir.startswith('/')
      - monitor_web_compose_file_path is string
      - monitor_web_compose_file_path.startswith('/')
      - monitor_web_nginx_conf_path is string
      - monitor_web_nginx_conf_path.startswith('/')
      - monitor_web_publish_dir is string
      - monitor_web_publish_dir.startswith('/')
      - monitor_web_publish_hosts_dir is string
      - monitor_web_publish_hosts_dir.startswith('/')
      - monitor_web_publish_html_path is string
      - monitor_web_publish_html_path.startswith('/')
      - monitor_web_publish_index_path is string
      - monitor_web_publish_index_path.startswith('/')
      - monitor_web_manifest_path is string
      - monitor_web_manifest_path.startswith('/')
      - monitor_web_service_worker_path is string
      - monitor_web_service_worker_path.startswith('/')
      - monitor_web_icon_path is string
      - monitor_web_icon_path.startswith('/')
      - monitor_web_compose_project_name is string
      - monitor_web_compose_project_name | trim | length > 0
      - monitor_web_compose_service_name is string
      - monitor_web_compose_service_name | trim | length > 0
      - monitor_web_container_name is string
      - monitor_web_container_name | trim | length > 0
      - monitor_web_image is string
      - monitor_web_image | trim | length > 0
      - monitor_web_proxy_network_name is string
      - monitor_web_proxy_network_name | trim | length > 0
      - monitor_web_host is string
      - monitor_web_host | trim | length > 0
      - monitor_web_router_name is string
      - monitor_web_router_name | trim | length > 0
      - monitor_web_basic_auth_enabled is boolean
      - monitor_web_basic_auth_users is sequence
      - monitor_web_basic_auth_users is not string
      - monitor_web_basic_auth_middleware is string
      - monitor_web_basic_auth_middleware | trim | length > 0
      - monitor_web_router_entrypoints is sequence
      - monitor_web_router_entrypoints | length > 0
      - monitor_web_tls_certresolver is string
      - monitor_web_tls_certresolver | trim | length > 0
      - monitor_web_container_port is number
      - monitor_web_container_port > 0
      - monitor_web_container_port < 65536
      - monitor_web_publish_dir_mode is string
      - monitor_web_publish_dir_mode | trim | length > 0
      - monitor_web_publish_file_mode is string
      - monitor_web_publish_file_mode | trim | length > 0
      - monitor_web_title is string
      - monitor_web_title | trim | length > 0
      - monitor_web_short_title is string
      - monitor_web_short_title | trim | length > 0
      - monitor_web_theme_color is string
      - monitor_web_theme_color | trim | length > 0
      - monitor_web_background_color is string
      - monitor_web_background_color | trim | length > 0
      - >-
        (
          groups['monitoring'] | default([])
          | map('extract', hostvars, 'monitoring_include_web')
          | map('default', false)
          | select('equalto', true)
          | list
          | length
        ) <= 1
    fail_msg: >-
      monitor_web requires valid Docker Compose, Traefik, and hostname values,
      and at most one web-enabled collector host in the current inventory
    quiet: true
  when: monitor_web_enabled

- name: "Assert | Validate monitor_web basic-auth users when enabled"
  ansible.builtin.assert:
    that:
      - monitor_web_basic_auth_users | length > 0
      - >-
        (
          monitor_web_basic_auth_users
          | select('string')
          | map('trim')
          | reject('equalto', '')
          | list
          | length
        ) == (monitor_web_basic_auth_users | length)
      - >-
        (
          monitor_web_basic_auth_users
          | map('trim')
          | select('search', '^[^:]+:.+$')
          | list
          | length
        ) == (monitor_web_basic_auth_users | length)
    fail_msg: >-
      monitor_web basic auth requires one or more non-empty user:hash entries
      when monitor_web_basic_auth_enabled is true
    quiet: true
  when:
    - monitor_web_enabled
    - monitor_web_basic_auth_enabled

- name: "Assert | Validate monitor_web variables when disabled"
  ansible.builtin.assert:
    that:
      - monitor_web_enabled is boolean
    fail_msg: "monitor_web_enabled must be a boolean"
    quiet: true
  when: not monitor_web_enabled
