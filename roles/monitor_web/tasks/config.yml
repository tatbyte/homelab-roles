---
# roles/monitor_web/tasks/config.yml
# Config phase tasks for the `monitor_web` role.

- name: "Config | Inspect required Traefik proxy network for monitor_web"
  ansible.builtin.command:
    argv:
      - docker
      - network
      - inspect
      - "{{ monitor_web_proxy_network_name }}"
  register: monitor_web_proxy_network
  changed_when: false
  failed_when: false
  when: monitor_web_enabled

- name: "Config | Require Traefik proxy network before publishing monitor_web"
  ansible.builtin.assert:
    that:
      - monitor_web_proxy_network.rc == 0
    fail_msg: >-
      monitor_web publishing requires the external proxy network
      {{ monitor_web_proxy_network_name }}. Run docker_traefik first or point
      monitor_web_proxy_network_name at an existing Traefik network.
    quiet: true
  when: monitor_web_enabled

- name: "Config | Check whether a managed monitor_web Compose file already exists"
  ansible.builtin.stat:
    path: "{{ monitor_web_compose_file_path }}"
  register: monitor_web_compose_file_stat
  changed_when: false

- name: "Config | Stop managed monitor_web project when disabled"
  ansible.builtin.command:
    argv: >-
      {{
        monitor_web_compose_command
        + [
            '--project-name',
            monitor_web_compose_project_name,
            '--file',
            monitor_web_compose_file_path,
            'down',
          ]
      }}
  register: monitor_web_compose_down
  changed_when: monitor_web_compose_file_stat.stat.exists
  when:
    - not monitor_web_enabled
    - monitor_web_compose_file_stat.stat.exists

- name: "Config | Ensure monitor_web project directory exists"
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ monitor_web_project_dir }}"
      owner: root
      group: root
      mode: "0755"
    - path: "{{ monitor_web_publish_dir }}"
      owner: "{{ monitor_web_site_owner }}"
      group: "{{ monitor_web_site_group }}"
      mode: "{{ monitor_web_publish_dir_mode }}"
  when: monitor_web_enabled

- name: "Config | Normalize monitor_web published site ownership"
  ansible.builtin.file:
    path: "{{ monitor_web_publish_dir }}"
    state: directory
    owner: "{{ monitor_web_site_owner }}"
    group: "{{ monitor_web_site_group }}"
    recurse: true
  when: monitor_web_enabled

- name: "Config | Render published monitor_web dashboard page"
  ansible.builtin.template:
    src: monitor-collect-index.html.j2
    dest: "{{ monitor_web_publish_html_path }}"
    owner: "{{ monitor_web_site_owner }}"
    group: "{{ monitor_web_site_group }}"
    mode: "{{ monitor_web_publish_file_mode }}"
  when: monitor_web_enabled

- name: "Config | Render published monitor_web PWA assets"
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: "{{ monitor_web_site_owner }}"
    group: "{{ monitor_web_site_group }}"
    mode: "{{ monitor_web_publish_file_mode }}"
  loop:
    - src: monitor-collect-manifest.webmanifest.j2
      dest: "{{ monitor_web_manifest_path }}"
    - src: monitor-collect-service-worker.js.j2
      dest: "{{ monitor_web_service_worker_path }}"
    - src: monitor-collect-icon.svg.j2
      dest: "{{ monitor_web_icon_path }}"
  when: monitor_web_enabled

- name: "Config | Copy published monitor_web PNG app icons"
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: "{{ monitor_web_site_owner }}"
    group: "{{ monitor_web_site_group }}"
    mode: "{{ monitor_web_publish_file_mode }}"
  loop:
    - src: monitor-collect-icon-180.png
      dest: "{{ monitor_web_icon_png_180_path }}"
    - src: monitor-collect-icon-192.png
      dest: "{{ monitor_web_icon_png_192_path }}"
    - src: monitor-collect-icon-512.png
      dest: "{{ monitor_web_icon_png_512_path }}"
  when: monitor_web_enabled

- name: "Config | Render monitor_web nginx config"
  ansible.builtin.template:
    src: monitor-collect-web-nginx.conf.j2
    dest: "{{ monitor_web_nginx_conf_path }}"
    owner: root
    group: root
    mode: "0644"
  when: monitor_web_enabled

- name: "Config | Render monitor_web Compose file"
  ansible.builtin.template:
    src: monitor-collect-web-compose.yml.j2
    dest: "{{ monitor_web_compose_file_path }}"
    owner: root
    group: root
    mode: "0644"
  when: monitor_web_enabled

- name: "Config | Reconcile monitor_web Docker Compose project"
  ansible.builtin.command:
    argv: >-
      {{
        monitor_web_compose_command
        + [
            '--project-name',
            monitor_web_compose_project_name,
            '--file',
            monitor_web_compose_file_path,
            'up',
            '--detach',
          ]
      }}
  register: monitor_web_compose_up
  changed_when: >-
    'Creating' in (monitor_web_compose_up.stdout ~ monitor_web_compose_up.stderr)
    or 'Recreating' in (monitor_web_compose_up.stdout ~ monitor_web_compose_up.stderr)
    or 'Starting' in (monitor_web_compose_up.stdout ~ monitor_web_compose_up.stderr)
    or 'Pulling' in (monitor_web_compose_up.stdout ~ monitor_web_compose_up.stderr)
    or 'Created' in (monitor_web_compose_up.stdout ~ monitor_web_compose_up.stderr)
    or 'Recreated' in (monitor_web_compose_up.stdout ~ monitor_web_compose_up.stderr)
    or 'Started' in (monitor_web_compose_up.stdout ~ monitor_web_compose_up.stderr)
  when: monitor_web_enabled

- name: "Config | Remove legacy monitor_collect host-web service unit"
  ansible.builtin.file:
    path: "/etc/systemd/system/{{ monitor_web_legacy_service_unit }}"
    state: absent

- name: "Config | Remove monitor_web project artifacts when disabled"
  ansible.builtin.file:
    path: "{{ monitor_web_project_dir }}"
    state: absent
  when: not monitor_web_enabled

- name: "Config | Reload systemd after monitor_web cleanup"
  ansible.builtin.systemd_service:
    daemon_reload: true
