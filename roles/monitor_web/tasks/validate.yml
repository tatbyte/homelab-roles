---
# roles/monitor_web/tasks/validate.yml
# Validate phase tasks for the `monitor_web` role.

- name: "Validate | Stat monitor_web artifacts"
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ monitor_web_project_dir }}"
    - "{{ monitor_web_publish_dir }}"
    - "{{ monitor_web_publish_html_path }}"
    - "{{ monitor_web_manifest_path }}"
    - "{{ monitor_web_service_worker_path }}"
    - "{{ monitor_web_icon_path }}"
    - "{{ monitor_web_icon_png_180_path }}"
    - "{{ monitor_web_icon_png_192_path }}"
    - "{{ monitor_web_icon_png_512_path }}"
    - "{{ monitor_web_nginx_conf_path }}"
    - "{{ monitor_web_compose_file_path }}"
  register: monitor_web_artifacts
  when: monitor_web_enabled

- name: "Validate | Read monitor_web Docker Compose running services" # noqa: command-instead-of-module
  ansible.builtin.command:
    argv: >-
      {{
        monitor_web_compose_command
        + [
            '--project-name',
            monitor_web_compose_project_name,
            '--file',
            monitor_web_compose_file_path,
            'ps',
            '--services',
            '--status',
            'running',
          ]
      }}
  register: monitor_web_running_services
  changed_when: false
  when: monitor_web_enabled

- name: "Validate | Assert monitor_web final state when enabled"
  ansible.builtin.assert:
    that:
      - monitor_web_artifacts.results | map(attribute='stat.exists') | min
      - monitor_web_running_services.rc == 0
      - monitor_web_compose_service_name in (monitor_web_running_services.stdout_lines | default([]))
    fail_msg: >-
      monitor_web is enabled, but the expected Docker Compose artifacts or
      running container state were not validated successfully
    quiet: true
  when: monitor_web_enabled

- name: "Validate | Stat monitor_web managed files when disabled"
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ monitor_web_project_dir }}"
    - "/etc/systemd/system/{{ monitor_web_legacy_service_unit }}"
  register: monitor_web_removed_paths
  when: not monitor_web_enabled

- name: "Validate | Assert monitor_web cleanup when disabled"
  ansible.builtin.assert:
    that:
      - not (monitor_web_removed_paths.results | map(attribute='stat.exists') | max)
    fail_msg: >-
      monitor_web is disabled, but one or more managed files still exist on
      the host
    quiet: true
  when: not monitor_web_enabled
