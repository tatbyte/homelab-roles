---
# roles/user/tasks/main.yml
# Task entrypoint for the `user` role.
# Defines the aggregate user-role execution order through explicit role includes.

- name: "User | Include user_account role"
  ansible.builtin.include_role:
    name: user_account
    apply:
      tags: [user, user_account]
  vars:
    user_account_manage_shell: "{{ not (user_include_zshell | default(false)) }}"
  tags: [user, user_account, assert, config, validate, user_account_assert, user_account_config, user_account_validate]

- name: "User | Include optional user_groups role"
  ansible.builtin.include_role:
    name: user_groups
    apply:
      tags: [user, user_groups]
  when: user_include_groups | default(false)
  tags: [user, user_groups, assert, config, validate, user_groups_assert, user_groups_config, user_groups_validate]

- name: "User | Include optional user_sudo role"
  ansible.builtin.include_role:
    name: user_sudo
    apply:
      tags: [user, user_sudo]
  vars:
    user_sudo_state: "{{ 'present' if user_include_sudo | default(false) else 'absent' }}"
  when: >-
    user_include_sudo | default(false)
    or user_cleanup_disabled_sudo_drop_in | default(false)
  tags: [user, user_sudo, assert, config, validate, user_sudo_assert, user_sudo_config, user_sudo_validate]

- name: "User | Include optional user_password role"
  ansible.builtin.include_role:
    name: user_password
    apply:
      tags: [user, user_password]
  when: user_include_password | default(false)
  tags: [user, user_password, assert, config, validate, user_password_assert, user_password_config, user_password_validate]

- name: "User | Include optional user_zshell role"
  ansible.builtin.include_role:
    name: user_zshell
    apply:
      tags: [user, user_zshell]
  when:
    - user_include_zshell | default(false)
    - (user_account_state | default('present')) == 'present'
  tags: [user, user_zshell, assert, config, validate, user_zshell_assert, user_zshell_config, user_zshell_validate]

- name: "User | Include optional user_directories role"
  ansible.builtin.include_role:
    name: user_directories
    apply:
      tags: [user, user_directories]
  when:
    - user_include_directories | default(false)
    - (user_account_state | default('present')) == 'present'
  tags: [user, user_directories, assert, config, validate, user_directories_assert, user_directories_config, user_directories_validate]

- name: "User | Include optional user_git role"
  ansible.builtin.include_role:
    name: user_git
    apply:
      tags: [user, user_git]
  when:
    - user_include_git | default(false)
    - (user_account_state | default('present')) == 'present'
  tags: [user, user_git, assert, install, config, validate, user_git_assert, user_git_install, user_git_config, user_git_validate]
