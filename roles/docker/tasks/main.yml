---
# roles/docker/tasks/main.yml
# Task entrypoint for the `docker` role.
# Defines the aggregate Docker-role execution order through explicit role includes.

- name: "Docker | Include optional docker_engine role"
  ansible.builtin.include_role:
    name: docker_engine
    apply:
      tags: [docker, docker_engine]
  when: docker_include_engine | default(true)
  tags:
    [
      docker,
      docker_engine,
      assert,
      install,
      config,
      validate,
      docker_engine_assert,
      docker_engine_install,
      docker_engine_config,
      docker_engine_validate,
    ]

- name: "Docker | Include optional docker_traefik role"
  ansible.builtin.include_role:
    name: docker_traefik
    apply:
      tags: [docker, docker_traefik]
  when: docker_include_traefik | default(false)
  tags:
    [
      docker,
      docker_traefik,
      assert,
      install,
      config,
      validate,
      docker_traefik_assert,
      docker_traefik_install,
      docker_traefik_config,
      docker_traefik_validate,
    ]

- name: "Docker | Include optional docker_adguard role"
  ansible.builtin.include_role:
    name: docker_adguard
    apply:
      tags: [docker, docker_adguard]
  when: docker_include_adguard | default(false)
  tags:
    [
      docker,
      docker_adguard,
      assert,
      install,
      config,
      validate,
      docker_adguard_assert,
      docker_adguard_install,
      docker_adguard_config,
      docker_adguard_validate,
    ]

- name: "Docker | Include optional docker_wireguard role"
  ansible.builtin.include_role:
    name: docker_wireguard
    apply:
      tags: [docker, docker_wireguard]
  when: docker_include_wireguard | default(false)
  tags:
    [
      docker,
      docker_wireguard,
      assert,
      install,
      config,
      validate,
      docker_wireguard_assert,
      docker_wireguard_install,
      docker_wireguard_config,
      docker_wireguard_validate,
    ]
