---
# roles/monitor_collect_now/tasks/validate.yml
# Starts the managed collector service immediately, reads the aggregated index,
# prints a short summary, and fails when the run result is not acceptable.

- name: "Validate | Stat monitor_collect service unit"
  ansible.builtin.stat:
    path: "/etc/systemd/system/{{ monitor_collect_now_service_unit }}"
  register: monitor_collect_now_service_unit_stat
  when: monitor_collect_now_enabled

- name: "Validate | Stat monitor_collect script path"
  ansible.builtin.stat:
    path: "{{ monitor_collect_now_script_path }}"
  register: monitor_collect_now_script_stat
  when: monitor_collect_now_enabled

- name: "Validate | Assert monitor_collect artifacts exist"
  ansible.builtin.assert:
    that:
      - monitor_collect_now_service_unit_stat.stat.exists
      - monitor_collect_now_script_stat.stat.exists
    fail_msg: >-
      monitor_collect_now expects the recurring monitor_collect role to be
      applied first so the managed service unit and script already exist
    quiet: true
  when: monitor_collect_now_enabled

- name: "Validate | Stat monitor_collect index before run"
  ansible.builtin.stat:
    path: "{{ monitor_collect_now_index_path }}"
    checksum_algorithm: sha1
  register: monitor_collect_now_index_before
  when: monitor_collect_now_enabled

- name: "Validate | Start monitor_collect oneshot service now"
  ansible.builtin.systemd_service:
    name: "{{ monitor_collect_now_service_unit }}"
    state: started
  register: monitor_collect_now_service_start
  failed_when: false
  when: monitor_collect_now_enabled

- name: "Validate | Wait for monitor_collect index"
  ansible.builtin.stat:
    path: "{{ monitor_collect_now_index_path }}"
    checksum_algorithm: sha1
  register: monitor_collect_now_index_file
  retries: 10
  delay: 1
  until: >-
    monitor_collect_now_index_file.stat.exists
    and (
      not (monitor_collect_now_index_before.stat.exists | default(false))
      or (monitor_collect_now_index_file.stat.checksum | default(''))
         != (monitor_collect_now_index_before.stat.checksum | default(''))
      or (monitor_collect_now_index_file.stat.mtime | default(0))
         > (monitor_collect_now_index_before.stat.mtime | default(0))
    )
  failed_when: false
  when: monitor_collect_now_enabled

- name: "Validate | Derive monitor_collect freshness"
  ansible.builtin.set_fact:
    monitor_collect_now_index_is_fresh: >-
      {{
        (monitor_collect_now_index_file.stat.exists | default(false))
        and (
          not (monitor_collect_now_index_before.stat.exists | default(false))
          or (monitor_collect_now_index_file.stat.checksum | default(''))
             != (monitor_collect_now_index_before.stat.checksum | default(''))
          or (monitor_collect_now_index_file.stat.mtime | default(0))
             > (monitor_collect_now_index_before.stat.mtime | default(0))
        )
      }}
  changed_when: false
  when: monitor_collect_now_enabled

- name: "Validate | Assert monitor_collect index was refreshed"
  ansible.builtin.assert:
    that:
      - monitor_collect_now_index_is_fresh
    fail_msg: >-
      monitor_collect_now did not observe a freshly updated index for the
      current run.
      systemd_msg={{ monitor_collect_now_service_start.msg | default('') }}
      previous_exists={{ monitor_collect_now_index_before.stat.exists | default(false) }}
      current_exists={{ monitor_collect_now_index_file.stat.exists | default(false) }}
    quiet: true
  when: monitor_collect_now_enabled

- name: "Validate | Read monitor_collect index JSON"
  ansible.builtin.slurp:
    src: "{{ monitor_collect_now_index_path }}"
  register: monitor_collect_now_index_slurp
  when: monitor_collect_now_enabled

- name: "Validate | Parse monitor_collect index JSON"
  ansible.builtin.set_fact:
    monitor_collect_now_index: "{{ monitor_collect_now_index_slurp.content | b64decode | from_json }}"
  changed_when: false
  when: monitor_collect_now_enabled

- name: "Validate | Print monitor_collect summary"
  ansible.builtin.debug:
    msg: >-
      [monitor_collect_now] host={{ inventory_hostname }}
      | status={{ monitor_collect_now_index.status | default('unknown') }}
      | timestamp={{ monitor_collect_now_index.timestamp | default('n/a') }}
      | host_count={{ monitor_collect_now_index.host_count | default('n/a') }}
      | ok={{ monitor_collect_now_index.summary.ok | default('n/a') }}
      | warn={{ monitor_collect_now_index.summary.warn | default('n/a') }}
      | fail={{ monitor_collect_now_index.summary.fail | default('n/a') }}
  when: monitor_collect_now_enabled

- name: "Validate | Assert monitor_collect run result is acceptable"
  ansible.builtin.assert:
    that:
      - not (monitor_collect_now_service_start.failed | default(false))
      - (monitor_collect_now_index.status | default('')) in monitor_collect_now_allowed_statuses
    fail_msg: >-
      monitor_collect_now run failed.
      systemd_msg={{ monitor_collect_now_service_start.msg | default('') }}
      status={{ monitor_collect_now_index.status | default('unknown') }}
    quiet: true
  when: monitor_collect_now_enabled
