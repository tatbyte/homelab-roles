---
# roles/monitor_collect_now/defaults/main.yml
# Default variables for the `monitor_collect_now` role.

monitor_collect_now_enabled: true
monitor_collect_now_service_unit: "{{ monitor_collect_service_unit | default('monitor-collect.service') }}"
monitor_collect_now_index_path: "{{ monitor_collect_index_path | default('/var/lib/monitor/collect/index.json') }}"
monitor_collect_now_script_path: "{{ monitor_collect_script_path | default('/usr/local/bin/monitor-collect.sh') }}"
monitor_collect_now_allowed_statuses:
  - ok
  - warn
