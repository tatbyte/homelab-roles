---
# roles/base_locale/tasks/validate.yml
# Validate phase tasks for the `base_locale` role.
# Verifies the requested locales are available and `/etc/locale.gen` plus the Debian-family locale category configuration file match the managed state.

- name: "Validate | Gather available locales"
  ansible.builtin.command: locale -a
  register: base_locale_installed_locales
  changed_when: false

- name: "Validate | Read /etc/default/locale"
  ansible.builtin.slurp:
    path: /etc/default/locale
  register: base_locale_config_file

- name: "Validate | Read /etc/locale.gen"
  ansible.builtin.slurp:
    path: /etc/locale.gen
  register: base_locale_locale_gen_file

- name: "Validate | Assert requested locales are enabled in /etc/locale.gen"
  vars:
    base_locale_generated_locales: >-
      {{
        base_locale_present
        | reject('in', ['C', 'C.UTF-8', 'POSIX'])
        | list
      }}
    base_locale_expected_locale_gen_lines: |-
      {% for locale_name in base_locale_generated_locales %}
      {{ locale_name }} {{
        (locale_name.split('.', 1) | last)
        | upper
        | regex_replace('^UTF8$', 'UTF-8')
      }}
      {% endfor %}
    base_locale_actual_locale_gen_lines: >-
      {{
        (base_locale_locale_gen_file.content | b64decode).splitlines()
        | reject('match', '^\\s*$')
        | list
      }}
  ansible.builtin.assert:
    that:
      - >-
        base_locale_actual_locale_gen_lines | sort == (
          base_locale_expected_locale_gen_lines.splitlines()
          | reject('match', '^\\s*$')
          | list
          | sort
        )
    fail_msg: "/etc/locale.gen does not match the managed locale list"
    quiet: true

- name: "Validate | Assert locale state"
  ansible.builtin.assert:
    that:
      - >-
        (
          (
            base_locale_present
            | map('lower')
            | map('regex_replace', '\\.utf-8$', '.utf8')
            | list
          )
          | difference(
            base_locale_installed_locales.stdout_lines
            | map('lower')
            | map('regex_replace', '\\.utf-8$', '.utf8')
            | list
          )
          | length
        ) == 0
      - >-
        ('LANG=' ~ base_locale_lang) in
        ((base_locale_config_file.content | b64decode).splitlines())
      - >-
        base_locale_lc_all | trim | length == 0
        or ('LC_ALL=' ~ base_locale_lc_all) in
        ((base_locale_config_file.content | b64decode).splitlines())
      - >-
        base_locale_lc_time | trim | length == 0
        or ('LC_TIME=' ~ base_locale_lc_time) in
        ((base_locale_config_file.content | b64decode).splitlines())
      - >-
        base_locale_lc_all | trim | length > 0
        or 'LC_ALL=' not in (base_locale_config_file.content | b64decode)
      - >-
        base_locale_lc_time | trim | length > 0
        or 'LC_TIME=' not in (base_locale_config_file.content | b64decode)
    fail_msg: "Configured locale state does not match the requested base_locale values"
    quiet: true
