---
# roles/base_locale/tasks/config.yml
# Config phase tasks for the `base_locale` role.
# Ensures `/etc/locale.gen` is fully managed, requested locales are generated for Debian-family hosts, and the locale category configuration file is written.

- name: "Config | Render locale.gen"
  vars:
    base_locale_generated_locales: >-
      {{
        base_locale_present
        | reject('in', ['C', 'C.UTF-8', 'POSIX'])
        | list
      }}
  ansible.builtin.template:
    src: locale.gen.j2
    dest: /etc/locale.gen
    owner: root
    group: root
    mode: "0644"
  notify: Regenerate locales

- name: "Config | Flush locale handler"
  ansible.builtin.meta: flush_handlers

- name: "Config | Render default locale"
  ansible.builtin.template:
    src: default_locale.j2
    dest: /etc/default/locale
    owner: root
    group: root
    mode: "0644"
