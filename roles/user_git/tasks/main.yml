---
# roles/user_git/tasks/main.yml
# Task entrypoint for the `user_git` role.
# Imports the assert, install, config, and validate phase files in order.

- name: Assert
  ansible.builtin.import_tasks: assert.yml
  tags: [user_git, assert, user_git_assert]

- name: Install
  ansible.builtin.import_tasks: install.yml
  tags: [user_git, install, user_git_install]

- name: Config
  ansible.builtin.import_tasks: config.yml
  tags: [user_git, config, user_git_config]

- name: Validate
  ansible.builtin.import_tasks: validate.yml
  tags: [user_git, validate, user_git_validate]
