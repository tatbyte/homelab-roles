---
# roles/base_timezone/tasks/main.yml
# Task entrypoint for the `base_timezone` role.
# Imports the assert, config, and validate phase files in order.

- name: Assert
  ansible.builtin.import_tasks: assert.yml
  tags: [assert, base_timezone_assert]

- name: Config
  ansible.builtin.import_tasks: config.yml
  tags: [config, base_timezone_config]

- name: Validate
  ansible.builtin.import_tasks: validate.yml
  tags: [validate, base_timezone_validate]
