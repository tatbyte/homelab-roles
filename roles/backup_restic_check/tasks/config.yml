---
# roles/backup_restic_check/tasks/config.yml
# Config phase tasks for the `backup_restic_check` role.
# Renders the managed Restic check environment file, script, and systemd
# timer/service units, or removes them when the role is disabled.

- name: "Config | Ensure backup_restic_check directories exist"
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ backup_restic_check_state_dir }}"
      mode: "0700"
    - path: "{{ backup_restic_check_status_dir }}"
      mode: "{{ backup_restic_check_status_dir_mode }}"
  when: backup_restic_check_enabled

- name: "Config | Render backup_restic_check environment file"
  ansible.builtin.template:
    src: backup-restic-check.env.j2
    dest: "{{ backup_restic_check_environment_file_path }}"
    owner: "{{ backup_restic_check_environment_owner }}"
    group: "{{ backup_restic_check_environment_group }}"
    mode: "{{ backup_restic_check_environment_mode }}"
  when: backup_restic_check_enabled

- name: "Config | Render backup_restic_check script"
  ansible.builtin.template:
    src: backup-restic-check.sh.j2
    dest: "{{ backup_restic_check_script_path }}"
    owner: "{{ backup_restic_check_script_owner }}"
    group: "{{ backup_restic_check_script_group }}"
    mode: "{{ backup_restic_check_script_mode }}"
  when: backup_restic_check_enabled

- name: "Config | Render backup_restic_check systemd units"
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "/etc/systemd/system/{{ item.dest }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - src: backup-restic-check.service.j2
      dest: "{{ backup_restic_check_service_unit }}"
    - src: backup-restic-check.timer.j2
      dest: "{{ backup_restic_check_timer_unit }}"
  when: backup_restic_check_enabled

- name: "Config | Reload systemd after backup_restic_check unit updates"
  ansible.builtin.systemd_service:
    daemon_reload: true
  when: backup_restic_check_enabled

- name: "Config | Ensure backup_restic_check timer is enabled and started"
  ansible.builtin.systemd_service:
    name: "{{ backup_restic_check_timer_unit }}"
    enabled: true
    state: started
  when: backup_restic_check_enabled

- name: "Config | Stop and disable backup_restic_check timer when disabled"
  ansible.builtin.systemd_service:
    name: "{{ backup_restic_check_timer_unit }}"
    enabled: false
    state: stopped
  failed_when: false
  when: not backup_restic_check_enabled

- name: "Config | Stop backup_restic_check service when disabled"
  ansible.builtin.systemd_service:
    name: "{{ backup_restic_check_service_unit }}"
    state: stopped
  failed_when: false
  when: not backup_restic_check_enabled

- name: "Config | Remove backup_restic_check managed files when disabled"
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ backup_restic_check_environment_file_path }}"
    - "{{ backup_restic_check_script_path }}"
    - "/etc/systemd/system/{{ backup_restic_check_service_unit }}"
    - "/etc/systemd/system/{{ backup_restic_check_timer_unit }}"
  when: not backup_restic_check_enabled

- name: "Config | Reload systemd after backup_restic_check cleanup"
  ansible.builtin.systemd_service:
    daemon_reload: true
  when: not backup_restic_check_enabled
