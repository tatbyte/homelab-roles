---
# roles/backup_restic_check/tasks/main.yml
# Task entrypoint for the `backup_restic_check` role.
# Imports the assert, install, config, and validate phase files in order.

- name: Assert
  ansible.builtin.import_tasks: assert.yml
  tags: [backup_restic_check, assert, backup_restic_check_assert]

- name: Install
  ansible.builtin.import_tasks: install.yml
  tags: [backup_restic_check, install, backup_restic_check_install]

- name: Config
  ansible.builtin.import_tasks: config.yml
  tags: [backup_restic_check, config, backup_restic_check_config]

- name: Validate
  ansible.builtin.import_tasks: validate.yml
  tags: [backup_restic_check, validate, backup_restic_check_validate]
