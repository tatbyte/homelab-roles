---
# roles/backup_restic_check/defaults/main.yml
# Default variables for the `backup_restic_check` role.
# Defines the recurring Restic repository check job, status output, and
# systemd timer defaults.

backup_restic_check_enabled: true

backup_restic_check_packages: "{{ backup_restic_packages | default(['restic', 'jq']) }}"

backup_restic_check_unit_name: backup-restic-check
backup_restic_check_service_unit: "{{ backup_restic_check_unit_name }}.service"
backup_restic_check_timer_unit: "{{ backup_restic_check_unit_name }}.timer"
backup_restic_check_script_path: "/usr/local/bin/{{ backup_restic_check_unit_name }}.sh"
backup_restic_check_environment_file_path: "/etc/restic/{{ backup_restic_check_unit_name }}.env"
backup_restic_check_state_dir: /etc/restic
backup_restic_check_status_dir: /var/lib/monitor
backup_restic_check_status_path: "{{ backup_restic_check_status_dir }}/restic-check.json"

backup_restic_check_service_user: root
backup_restic_check_service_group: root
backup_restic_check_script_owner: root
backup_restic_check_script_group: root
backup_restic_check_script_mode: "0750"
backup_restic_check_environment_owner: root
backup_restic_check_environment_group: root
backup_restic_check_environment_mode: "0600"
backup_restic_check_status_dir_mode: "0755"

backup_restic_check_repository: "{{ backup_restic_repository | default('') }}"
backup_restic_check_repository_label: >-
  {{ backup_restic_repository_label | default(backup_restic_check_repository) }}
backup_restic_check_password: "{{ backup_restic_password | default('') }}"
backup_restic_check_extra_environment: "{{ backup_restic_extra_environment | default({}) }}"

backup_restic_check_status_host: "{{ ansible_hostname | default(inventory_hostname) }}"
backup_restic_check_job_name: restic_check
backup_restic_check_json_schema: restic_check_status_v1

backup_restic_check_read_data_subset: ""
backup_restic_check_extra_args: []
backup_restic_check_lock_wait: "{{ backup_restic_lock_wait | default('') }}"

backup_restic_check_timer_on_calendar: "Mon *-*-* 05:45:00"
backup_restic_check_timer_randomized_delay_sec: 0
backup_restic_check_timer_accuracy_sec: 1m
backup_restic_check_timer_persistent: true
