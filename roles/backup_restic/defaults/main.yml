---
# roles/backup_restic/defaults/main.yml
# Default variables for the `backup_restic` role.
# Defines the Restic package, repository, backup-scope, JSON-status, and
# systemd-timer defaults used for recurring host backups.

backup_restic_enabled: true

backup_restic_packages:
  - restic
  - jq

backup_restic_unit_name: backup-restic
backup_restic_service_unit: "{{ backup_restic_unit_name }}.service"
backup_restic_timer_unit: "{{ backup_restic_unit_name }}.timer"
backup_restic_script_path: "/usr/local/bin/{{ backup_restic_unit_name }}.sh"
backup_restic_environment_file_path: "/etc/restic/{{ backup_restic_unit_name }}.env"
backup_restic_paths_file_path: "{{ backup_restic_state_dir }}/backup.paths"
backup_restic_excludes_file_path: "{{ backup_restic_state_dir }}/exclude.txt"
backup_restic_state_dir: /etc/restic
backup_restic_status_dir: /var/lib/monitor
backup_restic_status_path: "{{ backup_restic_status_dir }}/restic-backup.json"

backup_restic_service_user: root
backup_restic_service_group: root
backup_restic_script_owner: root
backup_restic_script_group: root
backup_restic_script_mode: "0750"
backup_restic_environment_owner: root
backup_restic_environment_group: root
backup_restic_environment_mode: "0600"
backup_restic_paths_file_owner: root
backup_restic_paths_file_group: root
backup_restic_paths_file_mode: "0644"
backup_restic_excludes_file_owner: root
backup_restic_excludes_file_group: root
backup_restic_excludes_file_mode: "0644"
backup_restic_status_dir_mode: "0755"

backup_restic_repository: ""
backup_restic_repository_label: "{{ backup_restic_repository }}"
backup_restic_password: ""
backup_restic_extra_environment: {}

backup_restic_status_host: "{{ ansible_hostname | default(inventory_hostname) }}"
backup_restic_snapshot_host: "{{ ansible_hostname | default(inventory_hostname) }}"
backup_restic_job_name: restic_backup
backup_restic_json_schema: restic_backup_status_v1

backup_restic_paths:
  - /srv
  - /home
  - /root
  - /etc/ssh
  - /etc/letsencrypt
  - /etc/wireguard
  - /etc/systemd/system
  - /var/lib

backup_restic_excludes:
  - /tmp
  - /run
  - /proc
  - /sys
  - /dev
  - /mnt
  - /media
  - /var/cache
  - /var/tmp
  - /var/log/*
  - /var/lib/apt/lists/*
  - /var/lib/docker/tmp/*
  - /var/lib/docker/overlay2/*
  - /var/lib/docker/image/*
  - /var/lib/docker/containers/*/*-json.log

backup_restic_tags: []
backup_restic_extra_args: []
backup_restic_docker_stop_containers: []
backup_restic_lock_wait: ""
backup_restic_one_file_system: false

backup_restic_timer_on_calendar: "*-*-* 03:30:00"
backup_restic_timer_randomized_delay_sec: 30m
backup_restic_timer_accuracy_sec: 1m
backup_restic_timer_persistent: true
