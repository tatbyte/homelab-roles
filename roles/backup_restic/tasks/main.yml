---
# roles/backup_restic/tasks/main.yml
# Task entrypoint for the `backup_restic` role.
# Imports the assert, install, config, and validate phase files in order.

- name: Assert
  ansible.builtin.import_tasks: assert.yml
  tags: [backup_restic, assert, backup_restic_assert]

- name: Install
  ansible.builtin.import_tasks: install.yml
  tags: [backup_restic, install, backup_restic_install]

- name: Config
  ansible.builtin.import_tasks: config.yml
  tags: [backup_restic, config, backup_restic_config]

- name: Validate
  ansible.builtin.import_tasks: validate.yml
  tags: [backup_restic, validate, backup_restic_validate]
