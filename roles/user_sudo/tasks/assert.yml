---
# roles/user_sudo/tasks/assert.yml
# Assert phase tasks for the `user_sudo` role.
# Validates the requested human admin sudo policy before the managed sudoers drop-in is written.

- name: "Assert | Validate required user_sudo variables"
  ansible.builtin.assert:
    that:
      - user_sudo_user is defined
      - user_sudo_user is string
      - user_sudo_user | trim | length > 0
      - user_sudo_user == (user_sudo_user | trim)
      - user_sudo_user is not match('.*\\s+.*')
      - user_sudo_policy_type in ['user', 'group']
      - user_sudo_group is string
      - user_sudo_group | trim | length > 0
      - user_sudo_group == (user_sudo_group | trim)
      - user_sudo_group is not match('.*\\s+.*')
      - user_sudo_passwordless is boolean
      - user_sudo_drop_in_path is string
      - user_sudo_drop_in_path | trim | length > 0
      - user_sudo_drop_in_path == (user_sudo_drop_in_path | trim)
      - user_sudo_drop_in_path is match('^/etc/sudoers\\.d/[^/]+$')
      - (user_sudo_drop_in_path | basename) not in ['.', '..']
      - user_sudo_drop_in_path is not match('.*\\s+.*')
    fail_msg: >-
      user_sudo_user must be a non-empty username without whitespace,
      user_sudo_policy_type must be user or group, user_sudo_group must be a
      non-empty group name without whitespace, user_sudo_passwordless must be a
      boolean, and user_sudo_drop_in_path must be one direct file path under
      /etc/sudoers.d/ without whitespace
    quiet: true

- name: "Assert | Collect Human Admin Account Entry For Sudo Management"
  ansible.builtin.getent:
    database: passwd
    key: "{{ user_sudo_user }}"
  register: user_sudo_assert_passwd_lookup
  changed_when: false
  failed_when: false

- name: "Assert | Validate Human Admin Account Exists Before Sudo Management"
  ansible.builtin.assert:
    that:
      - user_sudo_user in (user_sudo_assert_passwd_lookup.ansible_facts.getent_passwd | default({}))
    fail_msg: >-
      user_sudo_user must already exist before the user_sudo role manages the
      human admin sudo policy
    quiet: true

- name: "Assert | Collect Sudo Policy Group Entry"
  ansible.builtin.getent:
    database: group
    key: "{{ user_sudo_group }}"
  register: user_sudo_assert_group_lookup
  changed_when: false
  failed_when: false
  when: user_sudo_policy_type == 'group'

- name: "Assert | Validate Sudo Policy Group Exists"
  ansible.builtin.assert:
    that:
      - user_sudo_group in (user_sudo_assert_group_lookup.ansible_facts.getent_group | default({}))
    fail_msg: >-
      user_sudo_group must already exist when user_sudo_policy_type is group
    quiet: true
  when: user_sudo_policy_type == 'group'

- name: "Assert | Collect Effective Group List For Human Admin Account"
  ansible.builtin.command:
    cmd: "id -Gn {{ user_sudo_user }}"
  register: user_sudo_assert_user_groups
  changed_when: false
  failed_when: false
  when: user_sudo_policy_type == 'group'

- name: "Assert | Validate Human Admin Membership In Sudo Policy Group"
  ansible.builtin.assert:
    that:
      - user_sudo_assert_user_groups.rc == 0
      - user_sudo_group in (user_sudo_assert_user_groups.stdout | trim | split())
    fail_msg: >-
      user_sudo_user must already belong to user_sudo_group before the
      user_sudo role can manage group-based sudo policy
    quiet: true
  when: user_sudo_policy_type == 'group'
