---
# roles/monitor_notify/tasks/validate.yml
# Validate phase tasks for the `monitor_notify` role.

- name: "Validate | Stat monitor_notify managed paths"
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ monitor_notify_script_path }}"
    - "{{ monitor_notify_state_dir }}"
    - "{{ monitor_notify_status_dir }}"
    - "/etc/systemd/system/{{ monitor_notify_service_unit }}"
    - "/etc/systemd/system/{{ monitor_notify_timer_unit }}"
  register: monitor_notify_managed_paths
  when: monitor_notify_enabled

- name: "Validate | Stat monitor_notify timer enablement symlink"
  ansible.builtin.stat:
    path: "/etc/systemd/system/timers.target.wants/{{ monitor_notify_timer_unit }}"
  register: monitor_notify_timer_enabled_symlink
  when: monitor_notify_enabled

- name: "Validate | Read monitor_notify timer systemd state" # noqa: command-instead-of-module
  ansible.builtin.command:
    argv:
      - systemctl
      - show
      - "{{ monitor_notify_timer_unit }}"
      - --property=LoadState
      - --property=ActiveState
      - --property=UnitFileState
      - --property=SubState
  register: monitor_notify_timer_state
  changed_when: false
  when: monitor_notify_enabled

- name: "Validate | Assert monitor_notify final state when enabled"
  ansible.builtin.assert:
    that:
      - monitor_notify_managed_paths.results | map(attribute='stat.exists') | min
      - monitor_notify_timer_enabled_symlink.stat.exists
      - monitor_notify_timer_state.rc == 0
      - "'LoadState=loaded' in monitor_notify_timer_state.stdout_lines"
      - "'ActiveState=active' in monitor_notify_timer_state.stdout_lines"
      - "'UnitFileState=enabled' in monitor_notify_timer_state.stdout_lines"
    fail_msg: >-
      monitor_notify is enabled, but the expected files or timer state were
      not validated successfully
    quiet: true
  when: monitor_notify_enabled

- name: "Validate | Stat monitor_notify managed files when disabled"
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ monitor_notify_script_path }}"
    - "{{ monitor_notify_state_dir }}"
    - "/etc/systemd/system/{{ monitor_notify_service_unit }}"
    - "/etc/systemd/system/{{ monitor_notify_timer_unit }}"
  register: monitor_notify_removed_paths
  when: not monitor_notify_enabled

- name: "Validate | Assert monitor_notify cleanup when disabled"
  ansible.builtin.assert:
    that:
      - not (monitor_notify_removed_paths.results | map(attribute='stat.exists') | max)
    fail_msg: >-
      monitor_notify is disabled, but one or more managed files still exist
      on the host
    quiet: true
  when: not monitor_notify_enabled
