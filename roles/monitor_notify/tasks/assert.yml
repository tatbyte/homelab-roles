---
# roles/monitor_notify/tasks/assert.yml
# Assert phase tasks for the `monitor_notify` role.

- name: "Assert | Validate monitor_notify variables when enabled"
  ansible.builtin.assert:
    that:
      - monitor_notify_enabled is boolean
      - monitor_notify_packages is sequence
      - monitor_notify_packages | length > 0
      - monitor_notify_index_path is string
      - monitor_notify_index_path | trim | length > 0
      - monitor_notify_index_path.startswith('/')
      - monitor_notify_status_path is string
      - monitor_notify_status_path | trim | length > 0
      - monitor_notify_status_path.startswith('/')
      - monitor_notify_state_hash_path is string
      - monitor_notify_state_hash_path | trim | length > 0
      - monitor_notify_state_hash_path.startswith('/')
      - monitor_notify_include_docker_down is boolean
      - monitor_notify_include_backup_failed is boolean
      - monitor_notify_ntfy_url is string
      - monitor_notify_ntfy_url | trim | length > 0
      - monitor_notify_ntfy_title_prefix is string
      - monitor_notify_ntfy_title_prefix | trim | length > 0
      - monitor_notify_ntfy_priority is string
      - monitor_notify_ntfy_priority | trim | length > 0
      - monitor_notify_ntfy_tags is sequence
      - monitor_notify_ntfy_tags is not string
      - monitor_notify_timer_on_calendar is string
      - monitor_notify_timer_on_calendar | trim | length > 0
      - monitor_notify_timer_randomized_delay_sec is string or monitor_notify_timer_randomized_delay_sec is number
      - monitor_notify_timer_accuracy_sec is string
      - monitor_notify_timer_accuracy_sec | trim | length > 0
      - monitor_notify_timer_persistent is boolean
      - >-
        (
          groups['monitoring'] | default([])
          | map('extract', hostvars, 'monitoring_include_notify')
          | map('default', false)
          | select('equalto', true)
          | list
          | length
        ) <= 1
    fail_msg: >-
      monitor_notify requires a collector index path, an ntfy URL, valid timer
      values, and at most one notify-enabled collector host in the current
      inventory
    quiet: true
  when: monitor_notify_enabled

- name: "Assert | Validate monitor_notify variables when disabled"
  ansible.builtin.assert:
    that:
      - monitor_notify_enabled is boolean
    fail_msg: "monitor_notify_enabled must be a boolean"
    quiet: true
  when: not monitor_notify_enabled
