---
# roles/monitor_notify/defaults/main.yml
# Default variables for the `monitor_notify` role.
# Reads the aggregated collector index and sends deduplicated ntfy alerts for
# a small set of actionable monitoring conditions.

monitor_notify_enabled: true

monitor_notify_packages:
  - curl
  - jq

monitor_notify_unit_name: monitor-notify
monitor_notify_service_unit: "{{ monitor_notify_unit_name }}.service"
monitor_notify_timer_unit: "{{ monitor_notify_unit_name }}.timer"
monitor_notify_script_path: "/usr/local/bin/{{ monitor_notify_unit_name }}.sh"
monitor_notify_state_dir: "/usr/local/lib/{{ monitor_notify_unit_name }}"
monitor_notify_state_hash_path: "{{ monitor_notify_state_dir }}/last-alerts.sha256"
monitor_notify_status_dir: /var/lib/monitor
monitor_notify_status_path: "{{ monitor_notify_status_dir }}/monitor-notify.json"

monitor_notify_script_owner: root
monitor_notify_script_group: root
monitor_notify_script_mode: "0750"
monitor_notify_status_dir_mode: "0755"

monitor_notify_index_path: "{{ monitor_collect_index_path | default('/var/lib/monitor/collect/index.json') }}"
monitor_notify_include_docker_down: true
monitor_notify_include_backup_failed: true

monitor_notify_ntfy_url: ""
monitor_notify_ntfy_title_prefix: Homelab Monitor
monitor_notify_ntfy_priority: high
monitor_notify_ntfy_tags:
  - warning
  - computer

monitor_notify_status_host: "{{ ansible_hostname | default(inventory_hostname) }}"
monitor_notify_job_name: monitor_notify
monitor_notify_json_schema: monitor_notify_status_v1

monitor_notify_timer_on_calendar: "*-*-* *:50:00"
monitor_notify_timer_randomized_delay_sec: 0
monitor_notify_timer_accuracy_sec: 1m
monitor_notify_timer_persistent: true
