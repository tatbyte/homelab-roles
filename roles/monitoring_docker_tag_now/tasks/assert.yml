---
# roles/monitoring_docker_tag_now/tasks/assert.yml
# Assert phase tasks for the `monitoring_docker_tag_now` role.
# Validates the on-demand monitoring-run inputs before the managed service is
# started manually.

- name: "Assert | Validate monitoring_docker_tag_now variables"
  ansible.builtin.assert:
    that:
      - monitoring_docker_tag_now_enabled is boolean
      - monitoring_docker_tag_now_service_unit is string
      - monitoring_docker_tag_now_service_unit | trim | length > 0
      - monitoring_docker_tag_now_status_path is string
      - monitoring_docker_tag_now_status_path.startswith('/')
      - monitoring_docker_tag_now_script_path is string
      - monitoring_docker_tag_now_script_path.startswith('/')
      - monitoring_docker_tag_now_wait_timeout_seconds is number
      - monitoring_docker_tag_now_wait_timeout_seconds >= 10
      - monitoring_docker_tag_now_allowed_statuses is sequence
      - monitoring_docker_tag_now_allowed_statuses | length > 0
      - monitoring_docker_tag_now_allowed_statuses | select('string') | list | length == monitoring_docker_tag_now_allowed_statuses | length
    fail_msg: >-
      monitoring_docker_tag_now requires a service unit name, script path,
      status path, wait timeout, allowed status list, and boolean control flag
    quiet: true
  when: monitoring_docker_tag_now_enabled
