---
# roles/base_packages/tasks/install.yml
# Install phase tasks for the `base_packages` role.
# Ensures the requested common packages are present on the target hosts with APT.

- name: "Install | Ensure requested packages are present"
  ansible.builtin.apt:
    name: "{{ base_packages_effective_install }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: base_packages_effective_install | length > 0
