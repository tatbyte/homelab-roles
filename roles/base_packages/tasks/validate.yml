---
# roles/base_packages/tasks/validate.yml
# Validate phase tasks for the `base_packages` role.
# Verifies the requested packages are present after installation.

- name: "Validate | Gather installed package facts"
  ansible.builtin.package_facts:
    manager: auto

- name: "Validate | Assert requested install packages are present"
  ansible.builtin.assert:
    that:
      - (base_packages_install | difference(ansible_facts.packages.keys() | list) | length) == 0
    fail_msg: >-
      Missing packages after install phase:
      {{ base_packages_install | difference(ansible_facts.packages.keys() | list) | join(', ') }}
    quiet: true

- name: "Validate | Assert requested removed packages are absent"
  ansible.builtin.assert:
    that:
      - (base_packages_remove | intersect(ansible_facts.packages.keys() | list) | length) == 0
    fail_msg: >-
      Packages still installed after config phase:
      {{ base_packages_remove | intersect(ansible_facts.packages.keys() | list) | join(', ') }}
    quiet: true
