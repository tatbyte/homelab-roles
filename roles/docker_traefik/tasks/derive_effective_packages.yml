---
# roles/docker_traefik/tasks/derive_effective_packages.yml
# Helper tasks for the `docker_traefik` role.
# Derives the effective Compose support packages, auto-detecting an available package when none are set explicitly.

- name: "Derive Packages | Probe available Compose support packages"
  ansible.builtin.command:
    argv:
      - apt-cache
      - show
      - "{{ item }}"
  register: docker_traefik_package_probe
  changed_when: false
  failed_when: false
  loop: "{{ docker_traefik_compose_package_candidates }}"
  loop_control:
    label: "{{ item }}"
  when:
    - docker_traefik_enabled | bool
    - docker_traefik_packages | length == 0

- name: "Derive Packages | Build effective package list"
  ansible.builtin.set_fact:
    docker_traefik_effective_packages: >-
      {{
        docker_traefik_packages
        if (docker_traefik_packages | length > 0)
        else (
          docker_traefik_package_probe.results
          | default([])
          | selectattr('rc', 'equalto', 0)
          | map(attribute='item')
          | list
        )[:1]
      }}
  changed_when: false
  when: docker_traefik_enabled | bool

- name: "Derive Packages | Assert an installable Compose support package exists"
  ansible.builtin.assert:
    that:
      - docker_traefik_effective_packages is sequence
      - docker_traefik_effective_packages is not string
      - docker_traefik_effective_packages | length > 0
    fail_msg: >-
      No installable Docker Compose support package was found. Set
      docker_traefik_packages explicitly or extend
      docker_traefik_compose_package_candidates for this host family.
    quiet: true
  when: docker_traefik_enabled | bool
