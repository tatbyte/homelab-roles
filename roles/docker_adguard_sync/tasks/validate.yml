---
# roles/docker_adguard_sync/tasks/validate.yml
# Validate phase tasks for the `docker_adguard_sync` role.
# Verifies package state, shared identities, rendered files, Docker network
# state, and the running Docker Compose AdGuard Sync service.

- name: "Validate | Gather package facts"
  ansible.builtin.package_facts:
    manager: auto
  when: docker_adguard_sync_enabled | bool

- name: "Validate | Derive effective Compose support packages"
  ansible.builtin.import_tasks: derive_effective_packages.yml
  when: docker_adguard_sync_enabled | bool

- name: "Validate | Collect AdGuard Sync service-user entry"
  ansible.builtin.getent:
    database: passwd
    key: "{{ docker_adguard_sync_service_user }}"
  register: docker_adguard_sync_validate_service_user
  changed_when: false
  when: docker_adguard_sync_enabled | bool

- name: "Validate | Collect AdGuard Sync access-group entry"
  ansible.builtin.getent:
    database: group
    key: "{{ docker_adguard_sync_access_group }}"
  register: docker_adguard_sync_validate_access_group
  changed_when: false
  when: docker_adguard_sync_enabled | bool

- name: "Validate | Collect existing user entries for AdGuard Sync access-group validation"
  ansible.builtin.getent:
    database: passwd
    key: "{{ item }}"
  register: docker_adguard_sync_validate_passwd_lookup
  changed_when: false
  failed_when: false
  loop: "{{ docker_adguard_sync_access_group_members }}"
  loop_control:
    label: "{{ item }}"
  when:
    - docker_adguard_sync_enabled | bool
    - docker_adguard_sync_manage_access_group_memberships | bool
    - docker_adguard_sync_access_group_members | length > 0

- name: "Validate | Collect effective group lists for AdGuard Sync-managed existing users"
  ansible.builtin.command:
    cmd: "id -Gn {{ item.item }}"
  register: docker_adguard_sync_validate_groups
  changed_when: false
  failed_when: false
  loop: "{{ docker_adguard_sync_validate_passwd_lookup.results | default([]) }}"
  loop_control:
    label: "{{ item.item }}"
  when:
    - docker_adguard_sync_enabled | bool
    - docker_adguard_sync_manage_access_group_memberships | bool
    - item.item in (item.ansible_facts.getent_passwd | default({}))

- name: "Validate | Read Docker Compose file"
  ansible.builtin.slurp:
    path: "{{ docker_adguard_sync_compose_file_path }}"
  register: docker_adguard_sync_validate_compose_file
  when: docker_adguard_sync_enabled | bool

- name: "Validate | Read AdGuard Sync configuration file"
  ansible.builtin.slurp:
    path: "{{ docker_adguard_sync_config_path }}"
  register: docker_adguard_sync_validate_config_file
  when: docker_adguard_sync_enabled | bool

- name: "Validate | Gather service facts"
  ansible.builtin.service_facts:
  when: docker_adguard_sync_enabled | bool

- name: "Validate | Inspect Docker proxy network"
  ansible.builtin.command:
    argv:
      - docker
      - network
      - inspect
      - "{{ docker_adguard_sync_proxy_network_name }}"
  register: docker_adguard_sync_validate_proxy_network
  changed_when: false
  when: docker_adguard_sync_enabled | bool

- name: "Validate | Read Docker Compose running services"
  ansible.builtin.command:
    argv: >-
      {{
        docker_adguard_sync_compose_command
        + [
            '--project-name',
            docker_adguard_sync_compose_project_name,
            '--file',
            docker_adguard_sync_compose_file_path,
            'ps',
            '--services',
            '--status',
            'running',
          ]
      }}
  register: docker_adguard_sync_validate_compose_ps
  changed_when: false
  when: docker_adguard_sync_enabled | bool

- name: "Validate | Inspect running AdGuard Sync container"
  ansible.builtin.command:
    argv:
      - docker
      - inspect
      - "{{ docker_adguard_sync_container_name }}"
  register: docker_adguard_sync_validate_container_inspect
  changed_when: false
  when: docker_adguard_sync_enabled | bool

- name: "Validate | Check Docker Compose availability"
  ansible.builtin.command:
    argv: "{{ docker_adguard_sync_compose_command + ['version'] }}"
  register: docker_adguard_sync_validate_compose_version
  changed_when: false
  when: docker_adguard_sync_enabled | bool

- name: "Validate | Assert Docker AdGuard Sync state"
  vars:
    docker_adguard_sync_expected_compose: "{{ lookup('template', 'docker_adguard_sync_compose.yml.j2') }}"
    docker_adguard_sync_expected_config: "{{ lookup('template', 'docker_adguard_sync_config.yml.j2') }}"
    docker_adguard_sync_service_unit: >-
      {{
        docker_adguard_sync_docker_service_name
        if docker_adguard_sync_docker_service_name.endswith('.service')
        else (docker_adguard_sync_docker_service_name ~ '.service')
      }}
  ansible.builtin.assert:
    that:
      - (docker_adguard_sync_effective_packages | difference(ansible_facts.packages.keys() | list) | length) == 0
      - docker_adguard_sync_service_user in (docker_adguard_sync_validate_service_user.ansible_facts.getent_passwd | default({}))
      - docker_adguard_sync_access_group in (docker_adguard_sync_validate_access_group.ansible_facts.getent_group | default({}))
      - (docker_adguard_sync_validate_compose_file.content | b64decode) == docker_adguard_sync_expected_compose
      - (docker_adguard_sync_validate_config_file.content | b64decode) == docker_adguard_sync_expected_config
      - docker_adguard_sync_validate_compose_version.rc == 0
      - docker_adguard_sync_docker_service_name in ansible_facts.services or docker_adguard_sync_service_unit in ansible_facts.services
      - >-
        (
          docker_adguard_sync_service_unit in ansible_facts.services
          and ansible_facts.services[docker_adguard_sync_service_unit].state == 'running'
        ) or (
          docker_adguard_sync_docker_service_name in ansible_facts.services
          and ansible_facts.services[docker_adguard_sync_docker_service_name].state == 'running'
        )
      - docker_adguard_sync_validate_proxy_network.rc == 0
      - docker_adguard_sync_compose_service_name in (docker_adguard_sync_validate_compose_ps.stdout_lines | default([]))
      - docker_adguard_sync_validate_container_inspect.rc == 0
      - >-
        (
          not (docker_adguard_sync_manage_access_group_memberships | bool)
        ) or (
          (docker_adguard_sync_access_group_members | length) == 0
        ) or (
          docker_adguard_sync_access_group
          in (
            docker_adguard_sync_validate_groups.results
            | default([])
            | selectattr('item.item', 'defined')
            | selectattr('rc', 'equalto', 0)
            | map(attribute='stdout')
            | join(' ')
          )
        )
    fail_msg: >-
      docker_adguard_sync did not converge to the expected package, shared
      identity, rendered-file, proxy-network, or running-container state.
    quiet: true
