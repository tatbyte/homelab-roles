---
# roles/docker_adguard_sync/tasks/main.yml
# Task entrypoint for the `docker_adguard_sync` role.
# Imports the assert, install, config, and validate phase files in order.

- name: Assert
  ansible.builtin.import_tasks: assert.yml
  tags: [assert, docker_adguard, docker_adguard_sync, docker_adguard_sync_assert]

- name: Install
  ansible.builtin.import_tasks: install.yml
  tags: [install, docker_adguard, docker_adguard_sync, docker_adguard_sync_install]

- name: Config
  ansible.builtin.import_tasks: config.yml
  tags: [config, docker_adguard, docker_adguard_sync, docker_adguard_sync_config]

- name: Validate
  ansible.builtin.import_tasks: validate.yml
  tags: [validate, docker_adguard, docker_adguard_sync, docker_adguard_sync_validate]
