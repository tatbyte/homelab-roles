---
# roles/monitor_notify_now/tasks/validate.yml
# Starts the managed notification service immediately, reads the latest status,
# prints a short summary, and fails when the run result is not acceptable.

- name: "Validate | Stat monitor_notify service unit"
  ansible.builtin.stat:
    path: "/etc/systemd/system/{{ monitor_notify_now_service_unit }}"
  register: monitor_notify_now_service_unit_stat
  when: monitor_notify_now_enabled

- name: "Validate | Stat monitor_notify script path"
  ansible.builtin.stat:
    path: "{{ monitor_notify_now_script_path }}"
  register: monitor_notify_now_script_stat
  when: monitor_notify_now_enabled

- name: "Validate | Assert monitor_notify artifacts exist"
  ansible.builtin.assert:
    that:
      - monitor_notify_now_service_unit_stat.stat.exists
      - monitor_notify_now_script_stat.stat.exists
    fail_msg: >-
      monitor_notify_now expects the recurring monitor_notify role to be
      applied first so the managed service unit and script already exist
    quiet: true
  when: monitor_notify_now_enabled

- name: "Validate | Stat monitor_notify status before run"
  ansible.builtin.stat:
    path: "{{ monitor_notify_now_status_path }}"
    checksum_algorithm: sha1
  register: monitor_notify_now_status_before
  when: monitor_notify_now_enabled

- name: "Validate | Start monitor_notify oneshot service now"
  ansible.builtin.systemd_service:
    name: "{{ monitor_notify_now_service_unit }}"
    state: started
  register: monitor_notify_now_service_start
  failed_when: false
  when:
    - monitor_notify_now_enabled
    - not monitor_notify_now_send_test_alert

- name: "Validate | Run monitor_notify script directly with test-alert override"
  ansible.builtin.command:
    argv:
      - "{{ monitor_notify_now_script_path }}"
  environment:
    MONITOR_NOTIFY_TEST_ALERT: "1"
  register: monitor_notify_now_service_start
  changed_when: false
  failed_when: false
  when:
    - monitor_notify_now_enabled
    - monitor_notify_now_send_test_alert

- name: "Validate | Wait for monitor_notify status file"
  ansible.builtin.stat:
    path: "{{ monitor_notify_now_status_path }}"
    checksum_algorithm: sha1
  register: monitor_notify_now_status_file
  retries: 10
  delay: 1
  until: >-
    monitor_notify_now_status_file.stat.exists
    and (
      not (monitor_notify_now_status_before.stat.exists | default(false))
      or (monitor_notify_now_status_file.stat.checksum | default(''))
         != (monitor_notify_now_status_before.stat.checksum | default(''))
      or (monitor_notify_now_status_file.stat.mtime | default(0))
         > (monitor_notify_now_status_before.stat.mtime | default(0))
    )
  failed_when: false
  when: monitor_notify_now_enabled

- name: "Validate | Derive monitor_notify freshness"
  ansible.builtin.set_fact:
    monitor_notify_now_status_is_fresh: >-
      {{
        (monitor_notify_now_status_file.stat.exists | default(false))
        and (
          not (monitor_notify_now_status_before.stat.exists | default(false))
          or (monitor_notify_now_status_file.stat.checksum | default(''))
             != (monitor_notify_now_status_before.stat.checksum | default(''))
          or (monitor_notify_now_status_file.stat.mtime | default(0))
             > (monitor_notify_now_status_before.stat.mtime | default(0))
        )
      }}
  changed_when: false
  when: monitor_notify_now_enabled

- name: "Validate | Assert monitor_notify status was refreshed"
  ansible.builtin.assert:
    that:
      - monitor_notify_now_status_is_fresh
    fail_msg: >-
      monitor_notify_now did not observe a freshly updated status file for the
      current run.
      systemd_msg={{ monitor_notify_now_service_start.msg | default('') }}
      previous_exists={{ monitor_notify_now_status_before.stat.exists | default(false) }}
      current_exists={{ monitor_notify_now_status_file.stat.exists | default(false) }}
    quiet: true
  when: monitor_notify_now_enabled

- name: "Validate | Read monitor_notify status JSON"
  ansible.builtin.slurp:
    src: "{{ monitor_notify_now_status_path }}"
  register: monitor_notify_now_status_slurp
  when: monitor_notify_now_enabled

- name: "Validate | Parse monitor_notify status JSON"
  ansible.builtin.set_fact:
    monitor_notify_now_status: "{{ monitor_notify_now_status_slurp.content | b64decode | from_json }}"
  changed_when: false
  when: monitor_notify_now_enabled

- name: "Validate | Print monitor_notify summary"
  ansible.builtin.debug:
    msg: >-
      [monitor_notify_now] host={{ inventory_hostname }}
      | status={{ monitor_notify_now_status.status | default('unknown') }}
      | timestamp={{ monitor_notify_now_status.timestamp | default('n/a') }}
      | alerts={{ monitor_notify_now_status.details.alert_count | default('n/a') }}
      | sent={{ monitor_notify_now_status.details.notification_sent | default('n/a') }}
      | reason={{ monitor_notify_now_status.details.notification_reason | default('n/a') }}
  when: monitor_notify_now_enabled

- name: "Validate | Assert monitor_notify run result is acceptable"
  ansible.builtin.assert:
    that:
      - not (monitor_notify_now_service_start.failed | default(false))
      - (monitor_notify_now_status.status | default('')) in monitor_notify_now_allowed_statuses
    fail_msg: >-
      monitor_notify_now run failed.
      systemd_msg={{ monitor_notify_now_service_start.msg | default('') }}
      status={{ monitor_notify_now_status.status | default('unknown') }}
    quiet: true
  when: monitor_notify_now_enabled
