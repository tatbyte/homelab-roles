---
# roles/monitor_notify_now/tasks/assert.yml
# Assert phase tasks for the `monitor_notify_now` role.

- name: "Assert | Validate monitor_notify_now variables when enabled"
  ansible.builtin.assert:
    that:
      - monitor_notify_now_enabled is boolean
      - monitor_notify_now_service_unit is string
      - monitor_notify_now_service_unit | trim | length > 0
      - monitor_notify_now_script_path is string
      - monitor_notify_now_script_path.startswith('/')
      - monitor_notify_now_status_path is string
      - monitor_notify_now_status_path.startswith('/')
      - monitor_notify_now_send_test_alert is boolean
      - monitor_notify_now_allowed_statuses is sequence
      - monitor_notify_now_allowed_statuses | length > 0
    fail_msg: >-
      monitor_notify_now requires valid service, script, status path, and
      allowed status values when enabled
    quiet: true
  when: monitor_notify_now_enabled

- name: "Assert | Validate monitor_notify_now variables when disabled"
  ansible.builtin.assert:
    that:
      - monitor_notify_now_enabled is boolean
    fail_msg: "monitor_notify_now_enabled must be a boolean"
    quiet: true
  when: not monitor_notify_now_enabled
