---
# roles/monitor_notify_now/defaults/main.yml
# Default variables for the `monitor_notify_now` role.

monitor_notify_now_enabled: true
monitor_notify_now_service_unit: "{{ monitor_notify_service_unit | default('monitor-notify.service') }}"
monitor_notify_now_script_path: "{{ monitor_notify_script_path | default('/usr/local/bin/monitor-notify.sh') }}"
monitor_notify_now_status_path: "{{ monitor_notify_status_path | default('/var/lib/monitor/monitor-notify.json') }}"
monitor_notify_now_send_test_alert: true
monitor_notify_now_allowed_statuses:
  - ok
  - warn
