---
# roles/docker_wireguard/tasks/main.yml
# Task entrypoint for the `docker_wireguard` role.
# Imports the assert, install, config, and validate phase files in order.

- name: Assert
  ansible.builtin.import_tasks: assert.yml
  tags: [assert, docker_wireguard, docker_wireguard_assert]

- name: Install
  ansible.builtin.import_tasks: install.yml
  tags: [install, docker_wireguard, docker_wireguard_install]

- name: Config
  ansible.builtin.import_tasks: config.yml
  tags: [config, docker_wireguard, docker_wireguard_config]

- name: Validate
  ansible.builtin.import_tasks: validate.yml
  tags: [validate, docker_wireguard, docker_wireguard_validate]
