---
# roles/docker_wireguard/tasks/install.yml
# Install phase tasks for the `docker_wireguard` role.
# Ensures the requested Docker Compose support packages are installed with APT
# when WireGuard is enabled.

- name: "Install | Derive effective Compose support packages"
  ansible.builtin.import_tasks: derive_effective_packages.yml
  when: docker_wireguard_enabled | bool

- name: "Install | Ensure requested Docker WireGuard packages are present"
  ansible.builtin.apt:
    name: "{{ docker_wireguard_effective_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  when:
    - docker_wireguard_enabled | bool
    - docker_wireguard_effective_packages | length > 0
