---
# roles/docker_engine/defaults/main.yml
# Default variables for the `docker_engine` role.
# Defines Docker engine package, service, daemon, and user-group integration inputs for Debian-family hosts.

docker_engine_enabled: true

docker_engine_packages:
  - docker.io

# Ensure the engine role leaves the host with at least one working Compose
# path after any Docker package-family cleanup.
docker_engine_manage_compose_support: true
docker_engine_compose_packages: []
docker_engine_compose_package_candidates: >-
  {{
    (
      ['docker-compose-v2', 'docker-compose']
      if ('docker.io' in docker_engine_packages)
      else ['docker-compose-plugin', 'docker-compose-v2', 'docker-compose']
    )
  }}
docker_engine_compose_command_candidates:
  - [docker, compose]
  - [docker-compose]
docker_engine_default_compose_command:
  - docker
  - compose

# When the distro Docker package family is requested, remove known conflicting
# Docker Inc. packages first so hosts can migrate cleanly without mixed package
# ownership under /usr/libexec/docker/cli-plugins.
docker_engine_cleanup_conflicting_packages: "{{ 'docker.io' in docker_engine_packages }}"
docker_engine_conflicting_packages:
  - containerd.io
  - docker-ce
  - docker-ce-cli
  - docker-ce-rootless-extras
  - docker-buildx-plugin
  - docker-compose-plugin
docker_engine_fix_broken_apt_after_cleanup: true

docker_engine_service_name: docker
docker_engine_group_name: docker
docker_engine_config_dir: /etc/docker
docker_engine_daemon_config_path: "{{ docker_engine_config_dir }}/daemon.json"
docker_engine_log_driver: json-file
docker_engine_log_opts:
  max-size: "10m"
  max-file: "3"
docker_engine_daemon_config: >-
  {{
    {
      'log-driver': docker_engine_log_driver,
      'log-opts': docker_engine_log_opts
    }
  }}

# If true, ensure Docker supplementary-group membership for existing users.
docker_engine_manage_group_memberships: true
docker_engine_group_members: >-
  {{
    [
      (bootstrap_user | default('admin')),
      (user_account_name | default('admin'))
    ]
    | map('trim')
    | reject('equalto', '')
    | unique
    | list
  }}

# If true, register Docker group memberships for `user_groups` instead of
# relying only on direct group enforcement in this role.
docker_engine_register_user_groups_memberships: false
docker_engine_user_group_memberships: []
