---
# roles/docker_engine/tasks/install.yml
# Install phase tasks for the `docker_engine` role.
# Ensures the requested Docker engine packages are installed with APT when Docker is enabled.

- name: "Install | Remove conflicting Docker packages before engine install"
  ansible.builtin.apt:
    name: "{{ docker_engine_conflicting_packages }}"
    state: absent
    purge: true
    autoremove: false
    update_cache: true
    cache_valid_time: 3600
  when:
    - docker_engine_enabled | bool
    - docker_engine_cleanup_conflicting_packages | bool
    - docker_engine_conflicting_packages | length > 0

- name: "Install | Repair package manager state after Docker package cleanup"
  ansible.builtin.apt:
    state: fixed
  when:
    - docker_engine_enabled | bool
    - docker_engine_cleanup_conflicting_packages | bool
    - docker_engine_fix_broken_apt_after_cleanup | bool

- name: "Install | Ensure requested Docker engine packages are present"
  ansible.builtin.apt:
    name: "{{ docker_engine_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  when:
    - docker_engine_enabled | bool
    - docker_engine_packages | length > 0

- name: "Install | Derive effective Compose support packages"
  ansible.builtin.import_tasks: derive_effective_compose_packages.yml
  when:
    - docker_engine_enabled | bool
    - docker_engine_manage_compose_support | bool

- name: "Install | Ensure Docker Compose support packages are present"
  ansible.builtin.apt:
    name: "{{ docker_engine_effective_compose_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  when:
    - docker_engine_enabled | bool
    - docker_engine_manage_compose_support | bool
    - docker_engine_effective_compose_packages | length > 0

- name: "Install | Derive effective Docker Compose command"
  ansible.builtin.set_fact:
    docker_engine_effective_compose_command: >-
      {{
        ['docker', 'compose']
        if (
          docker_engine_effective_compose_packages
          | intersect(['docker-compose-plugin', 'docker-compose-v2'])
          | length
        ) > 0
        else (
          ['docker-compose']
          if ('docker-compose' in docker_engine_effective_compose_packages)
          else docker_engine_default_compose_command
        )
      }}
  changed_when: false
  when:
    - docker_engine_enabled | bool
    - docker_engine_manage_compose_support | bool
    - docker_engine_effective_compose_packages | length > 0
