---
# roles/docker_engine/tasks/assert.yml
# Assert phase tasks for the `docker_engine` role.
# Validates Docker package, service, daemon, group, and supplementary-group registration inputs before setup starts.

- name: "Assert | Validate docker_engine variable structure"
  ansible.builtin.assert:
    that:
      - docker_engine_enabled is boolean
      - docker_engine_packages is sequence
      - docker_engine_packages is not string
      - docker_engine_manage_compose_support is boolean
      - docker_engine_compose_packages is sequence
      - docker_engine_compose_packages is not string
      - docker_engine_compose_package_candidates is sequence
      - docker_engine_compose_package_candidates is not string
      - docker_engine_compose_command_candidates is sequence
      - docker_engine_compose_command_candidates is not string
      - docker_engine_default_compose_command is sequence
      - docker_engine_default_compose_command is not string
      - docker_engine_cleanup_conflicting_packages is boolean
      - docker_engine_conflicting_packages is sequence
      - docker_engine_conflicting_packages is not string
      - docker_engine_fix_broken_apt_after_cleanup is boolean
      - docker_engine_service_name is string
      - docker_engine_service_name | trim | length > 0
      - docker_engine_group_name is string
      - docker_engine_group_name | trim | length > 0
      - docker_engine_config_dir is string
      - docker_engine_config_dir.startswith('/')
      - docker_engine_daemon_config_path is string
      - docker_engine_daemon_config_path.startswith('/')
      - docker_engine_log_driver is string
      - docker_engine_log_driver | trim | length > 0
      - docker_engine_log_opts is mapping
      - docker_engine_daemon_config is mapping
      - docker_engine_manage_group_memberships is boolean
      - docker_engine_group_members is sequence
      - docker_engine_group_members is not string
      - docker_engine_register_user_groups_memberships is boolean
      - docker_engine_user_group_memberships is sequence
      - docker_engine_user_group_memberships is not string
      - (docker_engine_packages | map('string') | list | length) == (docker_engine_packages | length)
      - (docker_engine_packages | map('trim') | reject('equalto', '') | list | length) == (docker_engine_packages | length)
      - (docker_engine_compose_packages | map('string') | list | length) == (docker_engine_compose_packages | length)
      - (docker_engine_compose_packages | map('trim') | reject('equalto', '') | list | length) == (docker_engine_compose_packages | length)
      - (docker_engine_compose_package_candidates | map('string') | list | length) == (docker_engine_compose_package_candidates | length)
      - (docker_engine_compose_package_candidates | map('trim') | reject('equalto', '') | list | length) == (docker_engine_compose_package_candidates | length)
      - >-
        (
          docker_engine_compose_command_candidates | length
        ) == 0 or (
          (
            docker_engine_compose_command_candidates
            | map('type_debug')
            | unique
            | list
          ) == ['list']
        )
      - (docker_engine_default_compose_command | length) > 0
      - (docker_engine_conflicting_packages | map('string') | list | length) == (docker_engine_conflicting_packages | length)
      - (docker_engine_conflicting_packages | map('trim') | reject('equalto', '') | list | length) == (docker_engine_conflicting_packages | length)
      - (docker_engine_conflicting_packages | unique | list | length) == (docker_engine_conflicting_packages | length)
      - >-
        (
          docker_engine_log_opts | dict2items
          | map(attribute='key')
          | map('string')
          | map('trim')
          | reject('equalto', '')
          | list
          | length
        ) == (docker_engine_log_opts | length)
      - >-
        (
          docker_engine_log_opts | dict2items
          | map(attribute='value')
          | map('string')
          | map('trim')
          | reject('equalto', '')
          | list
          | length
        ) == (docker_engine_log_opts | length)
      - (docker_engine_group_members | map('string') | list | length) == (docker_engine_group_members | length)
      - (docker_engine_group_members | map('trim') | reject('equalto', '') | list | length) == (docker_engine_group_members | length)
      - (docker_engine_group_members | unique | list | length) == (docker_engine_group_members | length)
      - >-
        (
          docker_engine_compose_command_candidates
          | map('map', 'string')
          | map('list')
          | map('length')
          | min
          | default(1, true)
        ) > 0
      - >-
        (
          docker_engine_compose_command_candidates
          | map('map', 'string')
          | map('map', 'trim')
          | map('list')
          | map('select', 'equalto', '')
          | map('list')
          | map('length')
          | max
          | default(0, true)
        ) == 0
      - >-
        (
          docker_engine_default_compose_command | map('string') | list | length
        ) == (docker_engine_default_compose_command | length)
      - >-
        (
          docker_engine_default_compose_command
          | map('trim')
          | reject('equalto', '')
          | list
          | length
        ) == (docker_engine_default_compose_command | length)
      - >-
        (
          docker_engine_user_group_memberships | length
        ) == 0 or (
          (docker_engine_user_group_memberships | map('type_debug') | unique | list) == ['dict']
        )
    fail_msg: >-
      docker_engine_enabled, docker_engine_manage_compose_support, and
      docker_engine_manage_group_memberships must be booleans,
      docker_engine_packages, docker_engine_compose_packages,
      docker_engine_compose_package_candidates,
      docker_engine_conflicting_packages, and docker_engine_group_members must
      be lists of unique non-empty strings where required,
      docker_engine_default_compose_command must be a non-empty command-argv
      list,
      docker_engine_compose_command_candidates must be a list of non-empty
      command-argv lists,
      daemon config paths must be absolute, Docker daemon log settings must be
      non-empty mappings, docker_engine_service_name and
      docker_engine_group_name must be non-empty strings, cleanup toggles must
      be booleans, and docker_engine_user_group_memberships must be a list of
      mappings
    quiet: true

- name: "Assert | Validate requested user_groups registration structure"
  ansible.builtin.assert:
    that:
      - item.user is defined
      - item.user is string
      - item.user | trim | length > 0
      - item.groups is defined
      - item.groups is sequence
      - item.groups is not string
      - (item.groups | map('string') | list | length) == (item.groups | length)
      - (item.groups | map('trim') | reject('equalto', '') | list | length) == (item.groups | length)
      - (item.groups | unique | list | length) == (item.groups | length)
      - item.append is not defined or item.append is boolean
    fail_msg: >-
      Each docker_engine_user_group_memberships entry must include a non-empty user,
      a list of unique non-empty groups, and optional boolean append
    quiet: true
  loop: "{{ docker_engine_user_group_memberships }}"
  loop_control:
    label: "{{ item.user | default('docker-membership') }}"
