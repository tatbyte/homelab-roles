---
# roles/monitor_collect/tasks/config.yml
# Config phase tasks for the `monitor_collect` role.

- name: "Config | Ensure monitor_collect directories exist"
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ monitor_collect_state_dir }}"
      owner: root
      group: root
      mode: "0755"
    - path: "{{ monitor_collect_ssh_dir }}"
      owner: "{{ monitor_collect_service_user }}"
      group: "{{ monitor_collect_service_group }}"
      mode: "0700"
    - path: "{{ monitor_collect_output_dir }}"
      owner: "{{ monitor_collect_service_user }}"
      group: "{{ monitor_collect_service_group }}"
      mode: "{{ monitor_collect_output_dir_mode }}"
    - path: "{{ monitor_collect_hosts_dir }}"
      owner: "{{ monitor_collect_service_user }}"
      group: "{{ monitor_collect_service_group }}"
      mode: "{{ monitor_collect_output_dir_mode }}"
  when: monitor_collect_enabled

- name: "Config | Ensure monitor_collect public JSON mirror directories exist"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ monitor_collect_service_user }}"
    group: "{{ monitor_collect_service_group }}"
    mode: "{{ monitor_collect_public_dir_mode }}"
  loop:
    - "{{ monitor_collect_public_json_dir }}"
    - "{{ monitor_collect_public_hosts_dir }}"
  when:
    - monitor_collect_enabled
    - monitor_collect_public_json_enabled

- name: "Config | Ensure monitor_collect known_hosts file exists"
  ansible.builtin.file:
    path: "{{ monitor_collect_ssh_known_hosts_path }}"
    state: touch
    owner: "{{ monitor_collect_service_user }}"
    group: "{{ monitor_collect_service_group }}"
    mode: "0600"
    modification_time: preserve
    access_time: preserve
  when: monitor_collect_enabled

- name: "Config | Render monitor_collect SSH private key"
  ansible.builtin.copy:
    dest: "{{ monitor_collect_ssh_private_key_path }}"
    content: "{{ monitor_collect_ssh_private_key | trim ~ '\n' }}"
    owner: "{{ monitor_collect_service_user }}"
    group: "{{ monitor_collect_service_group }}"
    mode: "0600"
  when:
    - monitor_collect_enabled
    - monitor_collect_ssh_manage_private_key

- name: "Config | Remove managed monitor_collect SSH private key when disabled"
  ansible.builtin.file:
    path: "{{ monitor_collect_ssh_private_key_path }}"
    state: absent
  when:
    - monitor_collect_enabled
    - not monitor_collect_ssh_manage_private_key

- name: "Config | Render monitor_collect script"
  ansible.builtin.template:
    src: monitor-collect.sh.j2
    dest: "{{ monitor_collect_script_path }}"
    owner: "{{ monitor_collect_script_owner }}"
    group: "{{ monitor_collect_script_group }}"
    mode: "{{ monitor_collect_script_mode }}"
  when: monitor_collect_enabled

- name: "Config | Remove legacy monitor_collect private dashboard assets"
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ monitor_collect_output_dir }}/index.html"
    - "{{ monitor_collect_output_dir }}/manifest.webmanifest"
    - "{{ monitor_collect_output_dir }}/service-worker.js"
    - "{{ monitor_collect_output_dir }}/icon.svg"
    - "{{ monitor_collect_output_dir }}/icon-180.png"
    - "{{ monitor_collect_output_dir }}/icon-192.png"
    - "{{ monitor_collect_output_dir }}/icon-512.png"
  when: monitor_collect_enabled

- name: "Config | Render monitor_collect systemd units"
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "/etc/systemd/system/{{ item.dest }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - src: monitor-collect.service.j2
      dest: "{{ monitor_collect_service_unit }}"
    - src: monitor-collect.timer.j2
      dest: "{{ monitor_collect_timer_unit }}"
  when: monitor_collect_enabled

- name: "Config | Reload systemd after monitor_collect unit updates"
  ansible.builtin.systemd_service:
    daemon_reload: true
  when: monitor_collect_enabled

- name: "Config | Ensure monitor_collect timer is enabled and started"
  ansible.builtin.systemd_service:
    name: "{{ monitor_collect_timer_unit }}"
    enabled: true
    state: started
  when: monitor_collect_enabled

- name: "Config | Stop and disable monitor_collect timer when disabled"
  ansible.builtin.systemd_service:
    name: "{{ monitor_collect_timer_unit }}"
    enabled: false
    state: stopped
  failed_when: false
  when: not monitor_collect_enabled

- name: "Config | Stop monitor_collect service when disabled"
  ansible.builtin.systemd_service:
    name: "{{ monitor_collect_service_unit }}"
    state: stopped
  failed_when: false
  when: not monitor_collect_enabled

- name: "Config | Remove monitor_collect managed files when disabled"
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ monitor_collect_script_path }}"
    - "{{ monitor_collect_output_dir }}"
    - "{{ monitor_collect_state_dir }}"
    - "/etc/systemd/system/{{ monitor_collect_service_unit }}"
    - "/etc/systemd/system/{{ monitor_collect_timer_unit }}"
  when: not monitor_collect_enabled

- name: "Config | Reload systemd after monitor_collect cleanup"
  ansible.builtin.systemd_service:
    daemon_reload: true
  when: not monitor_collect_enabled
