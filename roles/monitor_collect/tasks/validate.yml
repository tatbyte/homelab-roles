---
# roles/monitor_collect/tasks/validate.yml
# Validate phase tasks for the `monitor_collect` role.

- name: "Validate | Stat monitor_collect managed paths"
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ monitor_collect_script_path }}"
    - "{{ monitor_collect_state_dir }}"
    - "{{ monitor_collect_ssh_dir }}"
    - "/etc/systemd/system/{{ monitor_collect_service_unit }}"
    - "/etc/systemd/system/{{ monitor_collect_timer_unit }}"
    - "{{ monitor_collect_output_dir }}"
  register: monitor_collect_managed_paths
  when: monitor_collect_enabled

- name: "Validate | Stat managed monitor_collect SSH private key"
  ansible.builtin.stat:
    path: "{{ monitor_collect_ssh_private_key_path }}"
  register: monitor_collect_private_key_stat
  when:
    - monitor_collect_enabled
    - monitor_collect_ssh_manage_private_key

- name: "Validate | Stat monitor_collect public JSON mirror paths"
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ monitor_collect_public_json_dir }}"
    - "{{ monitor_collect_public_hosts_dir }}"
  register: monitor_collect_public_paths
  when:
    - monitor_collect_enabled
    - monitor_collect_public_json_enabled

- name: "Validate | Stat monitor_collect timer enablement symlink"
  ansible.builtin.stat:
    path: "/etc/systemd/system/timers.target.wants/{{ monitor_collect_timer_unit }}"
  register: monitor_collect_timer_enabled_symlink
  when: monitor_collect_enabled

- name: "Validate | Read monitor_collect timer systemd state" # noqa: command-instead-of-module
  ansible.builtin.command:
    argv:
      - systemctl
      - show
      - "{{ monitor_collect_timer_unit }}"
      - --property=LoadState
      - --property=ActiveState
      - --property=UnitFileState
      - --property=SubState
  register: monitor_collect_timer_state
  changed_when: false
  when: monitor_collect_enabled

- name: "Validate | Assert monitor_collect final state when enabled"
  ansible.builtin.assert:
    that:
      - monitor_collect_managed_paths.results | map(attribute='stat.exists') | min
      - not monitor_collect_ssh_manage_private_key or monitor_collect_private_key_stat.stat.exists
      - not monitor_collect_public_json_enabled or (monitor_collect_public_paths.results | map(attribute='stat.exists') | min)
      - monitor_collect_timer_enabled_symlink.stat.exists
      - monitor_collect_timer_state.rc == 0
      - "'LoadState=loaded' in monitor_collect_timer_state.stdout_lines"
      - "'ActiveState=active' in monitor_collect_timer_state.stdout_lines"
      - "'UnitFileState=enabled' in monitor_collect_timer_state.stdout_lines"
    fail_msg: >-
      monitor_collect is enabled, but the expected files, mirror directories,
      or timer state were not validated successfully
    quiet: true
  when: monitor_collect_enabled

- name: "Validate | Stat monitor_collect managed files when disabled"
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ monitor_collect_script_path }}"
    - "{{ monitor_collect_output_dir }}"
    - "{{ monitor_collect_state_dir }}"
    - "/etc/systemd/system/{{ monitor_collect_service_unit }}"
    - "/etc/systemd/system/{{ monitor_collect_timer_unit }}"
  register: monitor_collect_removed_paths
  when: not monitor_collect_enabled

- name: "Validate | Assert monitor_collect cleanup when disabled"
  ansible.builtin.assert:
    that:
      - not (monitor_collect_removed_paths.results | map(attribute='stat.exists') | max)
    fail_msg: >-
      monitor_collect is disabled, but one or more managed files still exist
      on the host
    quiet: true
  when: not monitor_collect_enabled
