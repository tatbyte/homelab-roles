---
# roles/base/defaults/main.yml
# Default variables for the `base` role.
# Defines legacy aggregate-toggle compatibility defaults for optional base
# roles while inventories migrate to role-scoped `base_<role>_enabled` vars.

base_include_firewall: false
base_include_logging: false
base_include_updates: false
base_include_hosts: false
base_include_dns: false
base_include_apparmor: false
base_include_auditd: false
base_include_fail2ban: false
base_include_upgrade: false
base_include_needrestart: false
