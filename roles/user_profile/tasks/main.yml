---
# roles/user_profile/tasks/main.yml
# Task entrypoint for the `user_profile` role.
# Imports the assert, config, and validate phase files in order.

- name: Assert
  ansible.builtin.import_tasks: assert.yml
  tags: [user_profile, assert, user_profile_assert]

- name: Config
  ansible.builtin.import_tasks: config.yml
  tags: [user_profile, config, user_profile_config]

- name: Validate
  ansible.builtin.import_tasks: validate.yml
  tags: [user_profile, validate, user_profile_validate]
