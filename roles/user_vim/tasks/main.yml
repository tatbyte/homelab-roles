---
# roles/user_vim/tasks/main.yml
# Task entrypoint for the `user_vim` role.
# Imports the assert, install, config, and validate phase files in order.

- name: Assert
  ansible.builtin.import_tasks: assert.yml
  tags: [user_vim, assert, user_vim_assert]

- name: Install
  ansible.builtin.import_tasks: install.yml
  tags: [user_vim, install, user_vim_install]

- name: Config
  ansible.builtin.import_tasks: config.yml
  tags: [user_vim, config, user_vim_config]

- name: Validate
  ansible.builtin.import_tasks: validate.yml
  tags: [user_vim, validate, user_vim_validate]
