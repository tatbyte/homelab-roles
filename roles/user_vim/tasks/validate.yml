---
# roles/user_vim/tasks/validate.yml
# Validate phase tasks for the `user_vim` role.
# Verifies resulting `.vimrc` state and rendered content after configuration.

- name: "Validate | Derive Effective Human Admin Vim Policy"
  ansible.builtin.import_tasks: derive_effective_vim_policy.yml

- name: "Validate | Stat Managed Human Admin Vim RC Files"
  ansible.builtin.stat:
    path: "{{ item.vimrc_path }}"
  register: user_vim_validate_vimrc_stats
  changed_when: false
  loop: "{{ user_vim_effective_users }}"
  loop_control:
    label: "{{ item.vimrc_path }}"

- name: "Validate | Verify Human Admin Vim RC File State"
  vars:
    user_vim_expected_user: "{{ item.item }}"
  ansible.builtin.assert:
    that:
      - item.stat.exists
      - item.stat.isreg
      - item.stat.pw_name == user_vim_expected_user.user
      - item.stat.gr_name == user_vim_expected_user.group
      - item.stat.mode == user_vim_expected_user.mode
    fail_msg: >-
      Validate | Managed `.vimrc` file state does not match the requested
      user_vim policy
    quiet: true
  loop: "{{ user_vim_validate_vimrc_stats.results }}"
  loop_control:
    label: "{{ item.item.vimrc_path }}"

- name: "Validate | Read Managed Human Admin Vim RC Files"
  ansible.builtin.slurp:
    path: "{{ item.item.vimrc_path }}"
  register: user_vim_validate_vimrc_slurps
  changed_when: false
  loop: "{{ user_vim_validate_vimrc_stats.results | selectattr('stat.exists', 'equalto', true) | list }}"
  loop_control:
    label: "{{ item.item.vimrc_path }}"

- name: "Validate | Collect Human Admin Vim RC Template Source"
  vars:
    user_vim_validate_template_path: "{{ role_path ~ '/templates/' ~ item.item.item.vimrc_template_name }}"
    user_vim_validate_template_source: >-
      {{ lookup('file', user_vim_validate_template_path, errors='ignore') }}
  ansible.builtin.assert:
    that:
      - user_vim_validate_template_source is string
      - user_vim_validate_template_source | length > 0
    fail_msg: >-
      Validate | Managed `.vimrc` content does not match the requested user_vim policy
      because the template source is missing or unreadable for {{ item.item.item.vimrc_path }}.
      Checked template: {{ item.item.item.vimrc_template_name }}
    quiet: true
  loop: "{{ user_vim_validate_vimrc_slurps.results }}"
  loop_control:
    label: "{{ item.item.item.vimrc_path }}"

- name: "Validate | Verify Human Admin Vim RC File Content"
  ansible.builtin.include_tasks: validate_render_template.yml
  loop: "{{ user_vim_validate_vimrc_slurps.results }}"
  loop_control:
    label: "{{ item.item.item.vimrc_path }}"

- name: "Validate | Summarize Managed Human Admin Vim RC Policy"
  ansible.builtin.debug:
    msg: >-
      Managed {{ user_vim_effective_users | length }} user(s) with managed
      `.vimrc` files
