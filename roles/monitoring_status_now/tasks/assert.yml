---
# roles/monitoring_status_now/tasks/assert.yml
# Assert phase tasks for the `monitoring_status_now` role.
# Validates the on-demand monitoring-run inputs before the managed service is
# started manually.

- name: "Assert | Validate monitoring_status_now variables"
  ansible.builtin.assert:
    that:
      - monitoring_status_now_enabled is boolean
      - monitoring_status_now_service_unit is string
      - monitoring_status_now_service_unit | length > 0
      - monitoring_status_now_status_path is string
      - monitoring_status_now_status_path | length > 0
      - monitoring_status_now_script_path is string
      - monitoring_status_now_script_path | length > 0
      - monitoring_status_now_allowed_statuses is sequence
      - monitoring_status_now_allowed_statuses | length > 0
      - monitoring_status_now_allowed_statuses | select('string') | list | length == monitoring_status_now_allowed_statuses | length
    fail_msg: >-
      monitoring_status_now requires a service unit name, script path, status
      path, allowed status list, and boolean control flag
    quiet: true
  when: monitoring_status_now_enabled
