---
# roles/base_dns/defaults/main.yml
# Default variables for the `base_dns` role.
# Defines the resolver package selection, service, mode, DNS servers, and optional search domains enforced during the base phase.

base_dns_resolver_mode: systemd_resolved
base_dns_packages: >-
  {{
    ['systemd-resolved']
    if base_dns_resolver_mode == 'systemd_resolved'
    else []
  }}
base_dns_service_name: >-
  {{
    'systemd-resolved'
    if base_dns_resolver_mode == 'systemd_resolved'
    else 'NetworkManager'
  }}
base_dns_servers: []
base_dns_search_domains: []
base_dns_networkmanager_conf_dir: /etc/NetworkManager/conf.d
base_dns_networkmanager_conf_path: "{{ base_dns_networkmanager_conf_dir }}/90-base-dns.conf"
base_dns_resolv_conf_path: /etc/resolv.conf
