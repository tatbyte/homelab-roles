---
# roles/base_dns/tasks/main.yml
# Task entrypoint for the `base_dns` role.
# Imports the assert, install, config, and validate phase files in order.

- name: Assert
  ansible.builtin.import_tasks: assert.yml
  tags: [assert, base_dns, base_dns_assert]

- name: Install
  ansible.builtin.import_tasks: install.yml
  tags: [install, base_dns, base_dns_install]

- name: Config
  ansible.builtin.import_tasks: config.yml
  tags: [config, base_dns, base_dns_config]

- name: Validate
  ansible.builtin.import_tasks: validate.yml
  tags: [validate, base_dns, base_dns_validate]
