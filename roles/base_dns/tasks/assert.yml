---
# roles/base_dns/tasks/assert.yml
# Assert phase tasks for the `base_dns` role.
# Validates the requested resolver package, mode, service, DNS servers, and optional search domains before installation and configuration run.

- name: "Assert | Validate base_dns variable structure"
  ansible.builtin.assert:
    that:
      - base_dns_packages is sequence
      - base_dns_packages is not string
      - base_dns_service_name is string
      - base_dns_service_name | trim | length > 0
      - base_dns_service_name == (base_dns_service_name | trim)
      - base_dns_service_name is not match('.*\\s+.*')
      - base_dns_resolver_mode is string
      - base_dns_resolver_mode in ['systemd_resolved']
      - base_dns_servers is sequence
      - base_dns_servers is not string
      - (base_dns_servers | length) > 0
      - base_dns_search_domains is sequence
      - base_dns_search_domains is not string
      - (base_dns_packages | map('string') | list | length) == (base_dns_packages | length)
      - (base_dns_servers | map('string') | list | length) == (base_dns_servers | length)
      - (base_dns_search_domains | map('string') | list | length) == (base_dns_search_domains | length)
      - (base_dns_packages | map('trim') | reject('equalto', '') | list | length) == (base_dns_packages | length)
      - (base_dns_servers | map('trim') | reject('equalto', '') | list | length) == (base_dns_servers | length)
      - (base_dns_search_domains | map('trim') | reject('equalto', '') | list | length) == (base_dns_search_domains | length)
      - >-
        (
          base_dns_servers
          | select('match', '.*\\s+.*')
          | list
          | length
        ) == 0
      - >-
        (
          base_dns_search_domains
          | select('match', '.*\\s+.*')
          | list
          | length
        ) == 0
      - >-
        (
          base_dns_search_domains
          | select('match', '^~')
          | list
          | length
        ) == 0
    fail_msg: >-
      base_dns_packages must be a list of package names, base_dns_service_name
      must be a non-empty service name without whitespace,
      base_dns_resolver_mode must use a supported resolver mode,
      base_dns_servers must be a non-empty list of DNS server values without
      whitespace, and base_dns_search_domains must be a list of non-empty
      search domains without whitespace or split-DNS route-only prefixes
    quiet: true
