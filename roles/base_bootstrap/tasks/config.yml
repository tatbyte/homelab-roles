---
# Bootstrap role: configuration tasks (admin user management)

- name: "config | Check if Admin User Exists"
  ansible.builtin.getent:
    database: passwd
    key: "{{ base_bootstrap_user }}"
  ignore_errors: true
  register: base_bootstrap_user_exists

- name: "config | Ensure Admin User Exists"
  ansible.builtin.user:
    name: "{{ base_bootstrap_user }}"
    state: present
    shell: "{{ base_bootstrap_user_shell }}"
    groups: "{{ base_bootstrap_sudo_group | default('sudo') }}"
    append: true
    uid: "{{ base_bootstrap_puid }}"
    group: "{{ base_bootstrap_pgid }}"

- name: "config | Add Main Authorized_keys For Admin User"
  ansible.posix.authorized_key:
    user: "{{ base_bootstrap_user }}"
    state: present
    key: "{{ base_bootstrap_authorized_key }}"
  when: base_bootstrap_authorized_key is defined and base_bootstrap_authorized_key | length > 0
