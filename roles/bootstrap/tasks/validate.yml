---
# roles/bootstrap/tasks/validate.yml
# Validate phase tasks for the `bootstrap` role.
# Verifies the resulting passwd, group, sudo, and authorized-key state after configuration.

- name: "Validate | Collect Admin and Sudo Group Entries"
  ansible.builtin.getent:
    database: "{{ item.database }}"
    key: "{{ item.key }}"
  loop:
    - database: passwd
      key: "{{ bootstrap_user }}"
    - database: group
      key: "{{ bootstrap_sudo_group }}"
  loop_control:
    label: "{{ item.database }}"
  register: bootstrap_lookup

- name: "Validate | Read Admin Authorized_keys Only When Key Is Configured"
  ansible.builtin.slurp:
    path: "{{ bootstrap_lookup.results[0].ansible_facts.getent_passwd[bootstrap_user][4] }}/.ssh/authorized_keys"
  register: bootstrap_authorized_key_file
  changed_when: false
  failed_when: false
  when: bootstrap_authorized_key is defined and bootstrap_authorized_key | length > 0

- name: "Validate | Read bootstrap SSH handoff drop-in"
  ansible.builtin.slurp:
    path: "{{ bootstrap_sshd_handoff_config_path }}"
  register: bootstrap_sshd_handoff_config
  changed_when: false
  when:
    - bootstrap_manage_sshd_handoff | bool
    - bootstrap_sshd_allow_users | length > 0

- name: "Validate | Gather service facts"
  ansible.builtin.service_facts:
  when: bootstrap_manage_sshd_handoff | bool

- name: "Validate | Check effective AllowUsers for bootstrap SSH handoff"
  ansible.builtin.command:
    argv:
      - sshd
      - -T
      - -C
      - "user={{ item }},host={{ inventory_hostname }},addr={{ ansible_host | default(inventory_hostname) }}"
  loop: "{{ bootstrap_sshd_allow_users }}"
  loop_control:
    label: "{{ item }}"
  register: bootstrap_allow_users_checks
  changed_when: false
  when:
    - bootstrap_manage_sshd_handoff | bool
    - bootstrap_sshd_allow_users | length > 0

- name: "Validate | Verify Admin Account Matches Configured Bootstrap Settings"
  vars:
    bootstrap_sshd_service_unit: >-
      {{
        bootstrap_sshd_service_name
        if bootstrap_sshd_service_name.endswith('.service')
        else (bootstrap_sshd_service_name ~ '.service')
      }}
    bootstrap_handoff_password_authentication: >-
      {{ 'yes' if bootstrap_sshd_password_authentication else 'no' }}
    bootstrap_handoff_pubkey_authentication: >-
      {{ 'yes' if bootstrap_sshd_pubkey_authentication else 'no' }}
    bootstrap_effective_allowusers_values: >-
      {{
        bootstrap_allow_users_checks.results
        | default([])
        | map(attribute='stdout_lines')
        | flatten
        | select('match', '^allowusers ')
        | map('regex_replace', '^allowusers\\s+', '')
        | list
      }}
  ansible.builtin.assert:
    that:
      - bootstrap_user in bootstrap_lookup.results[0].ansible_facts.getent_passwd
      - bootstrap_lookup.results[0].ansible_facts.getent_passwd[bootstrap_user][1] | int == bootstrap_puid
      - bootstrap_lookup.results[0].ansible_facts.getent_passwd[bootstrap_user][2] | int == bootstrap_pgid
      - bootstrap_lookup.results[0].ansible_facts.getent_passwd[bootstrap_user][5] == bootstrap_user_shell
      - bootstrap_user in (
          bootstrap_lookup.results[1].ansible_facts.getent_group[bootstrap_sudo_group]
          | last
          | default('')
          | string
          | split(',')
          | map('trim')
          | reject('equalto', '')
          | list
        )
      - (
          bootstrap_authorized_key in (
            bootstrap_authorized_key_file.content
            | default('')
            | b64decode
            | split('\n')
            | map('trim')
            | reject('equalto', '')
            | list
          )
          if bootstrap_authorized_key is defined and bootstrap_authorized_key | length > 0
          else true
        )
      - >-
        (
          not (bootstrap_manage_sshd_handoff | bool)
        ) or (
          (bootstrap_sshd_allow_users | length) == 0
        ) or (
          (bootstrap_sshd_handoff_config.content | b64decode) is search(
            'PasswordAuthentication ' ~ bootstrap_handoff_password_authentication
          )
        )
      - >-
        (
          not (bootstrap_manage_sshd_handoff | bool)
        ) or (
          (bootstrap_sshd_allow_users | length) == 0
        ) or (
          (bootstrap_sshd_handoff_config.content | b64decode) is search(
            'PubkeyAuthentication ' ~ bootstrap_handoff_pubkey_authentication
          )
        )
      - >-
        (
          not (bootstrap_manage_sshd_handoff | bool)
        ) or (
          (bootstrap_sshd_allow_users | length) == 0
        ) or (
          bootstrap_sshd_service_unit in ansible_facts.services
        )
      - >-
        (
          not (bootstrap_manage_sshd_handoff | bool)
        ) or (
          (bootstrap_sshd_allow_users | length) == 0
        ) or (
          ansible_facts.services[bootstrap_sshd_service_unit].state == 'running'
        )
      - >-
        (
          not (bootstrap_manage_sshd_handoff | bool)
        ) or (
          (
            bootstrap_sshd_allow_users
            | difference(
                bootstrap_effective_allowusers_values
                | map('split', ' ')
                | flatten
                | list
              )
            | length
          ) == 0
        )
    fail_msg: >-
      Validate | Admin account is not in the expected final state (uid/gid/shell/sudo group/authorized key/bootstrap SSH handoff)
    quiet: true
