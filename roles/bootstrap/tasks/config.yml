---
# roles/bootstrap/tasks/config.yml
# Config phase tasks for the `bootstrap` role.
# Creates and configures the automation account, group membership, sudo policy, and authorized key.

- name: "Config | Ensure Admin Primary Group Exists"
  ansible.builtin.group:
    name: "{{ bootstrap_user }}"
    gid: "{{ bootstrap_pgid }}"
    state: present

- name: "Config | Ensure Admin User Exists"
  ansible.builtin.user:
    name: "{{ bootstrap_user }}"
    state: present
    shell: "{{ bootstrap_user_shell }}"
    groups: "{{ bootstrap_sudo_group | default('sudo') }}"
    append: true
    uid: "{{ bootstrap_puid }}"
    group: "{{ bootstrap_user }}"

- name: "Config | Allow Passwordless Sudo For Admin User"
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/90-{{ bootstrap_user }}"
    content: "{{ bootstrap_user }} ALL=(ALL:ALL) NOPASSWD:ALL\n"
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"
  when: bootstrap_passwordless_sudo | bool

- name: "Config | Add Main Authorized_keys For Admin User"
  ansible.posix.authorized_key:
    user: "{{ bootstrap_user }}"
    state: present
    key: "{{ bootstrap_authorized_key }}"
  when: bootstrap_authorized_key is defined and bootstrap_authorized_key | length > 0

- name: "Config | Ensure sshd drop-in directory exists for bootstrap handoff"
  ansible.builtin.file:
    path: "{{ bootstrap_sshd_dropin_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: bootstrap_manage_sshd_handoff | bool

- name: "Config | Ensure main sshd_config includes drop-in directory for bootstrap handoff"
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^Include /etc/ssh/sshd_config\.d/\*\.conf$'
    line: 'Include /etc/ssh/sshd_config.d/*.conf'
    insertbefore: BOF
  notify: Restart bootstrap SSH service
  when: bootstrap_manage_sshd_handoff | bool

- name: "Config | Render bootstrap SSH handoff drop-in"
  ansible.builtin.template:
    src: bootstrap_sshd_handoff.conf.j2
    dest: "{{ bootstrap_sshd_handoff_config_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart bootstrap SSH service
  when:
    - bootstrap_manage_sshd_handoff | bool
    - bootstrap_sshd_allow_users | length > 0

- name: "Config | Validate SSH daemon syntax for bootstrap handoff"
  ansible.builtin.command: sshd -t -f /etc/ssh/sshd_config
  changed_when: false
  when: bootstrap_manage_sshd_handoff | bool

- name: "Config | Ensure SSH service is enabled and running for bootstrap handoff"
  ansible.builtin.service:
    name: "{{ bootstrap_sshd_service_name }}"
    enabled: true
    state: started
  when: bootstrap_manage_sshd_handoff | bool

- name: "Config | Flush bootstrap SSH handler"
  ansible.builtin.meta: flush_handlers
  when: bootstrap_manage_sshd_handoff | bool
