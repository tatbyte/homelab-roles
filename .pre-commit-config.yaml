# .pre-commit-config.yaml
# Pre-commit configuration for repository-wide linting and file hygiene checks.
# Defines shared hooks for metadata validation, YAML formatting, and Ansible linting.

minimum_pre_commit_version: "3.7.0"
default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: meta
    hooks:
      - id: check-hooks-apply
      - id: check-useless-excludes

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: ^roles/base_locale/templates/locale\.gen\.j2$
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: check-yaml
        args: ["--unsafe"]
      - id: check-added-large-files

  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.38.0
    hooks:
      - id: yamllint
        args:
          - -d
          - |
            {
              extends: default,
              rules: {
                truthy: disable,
                line-length: {max: 160},
                comments: disable,
                braces: {max-spaces-inside: 1}
              }
            }

  - repo: local
    hooks:
      - id: ansible-lint
        name: ansible-lint (pipx)
        entry: ansible-lint -q
        language: system
        pass_filenames: false
        files: \.ya?ml$
